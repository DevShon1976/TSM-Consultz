<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TSM Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060b10;--bg2:#080e16;--bg3:#0a1220;
  --border:rgba(0,180,255,.12);--border2:rgba(0,229,255,.25);
  --accent:#00e5ff;--green:#00e676;--dim:#2a4a5a;--muted:#3a5a6a;
  --text:#8ab8c8;--bright:#d8eef8;--gold:#c9a84c;
  --mono:'Share Tech Mono',monospace;--ui:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;height:44px;
}
.logo{font-family:var(--ui);font-size:16px;font-weight:700;color:var(--accent);letter-spacing:3px;}
.hub-badge{font-size:9px;color:var(--accent);border:1px solid var(--border2);padding:2px 8px;border-radius:2px;letter-spacing:2px;margin-left:10px;}
.topbar-right{font-size:9px;color:var(--dim);letter-spacing:2px;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:200px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;
}
.search-wrap{padding:10px;border-bottom:1px solid var(--border);}
.search-wrap input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--bright);font-family:var(--mono);font-size:10px;
  padding:6px 8px;outline:none;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--dim);}

.filter-bar{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.ftag{
  font-size:8px;letter-spacing:1px;padding:3px 7px;border:1px solid var(--border);
  color:var(--muted);cursor:pointer;transition:.15s;border-radius:2px;
}
.ftag:hover{border-color:var(--accent);color:var(--accent);}
.ftag.active{border-color:var(--accent);color:var(--bg);background:var(--accent);}

.app-count{padding:6px 12px;font-size:9px;color:var(--dim);letter-spacing:2px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.app-count span{color:var(--accent);}

.app-list{flex:1;overflow-y:auto;}
.app-list::-webkit-scrollbar{width:3px;}
.app-list::-webkit-scrollbar-thumb{background:var(--border);}

.sector-label{
  font-size:8px;letter-spacing:3px;color:var(--dim);
  padding:8px 12px 4px;text-transform:uppercase;
}
.app-item{
  display:flex;align-items:center;gap:7px;
  padding:7px 12px;cursor:pointer;transition:.12s;
  border-left:2px solid transparent;
}
.app-item:hover{background:var(--bg3);border-left-color:var(--border2);}
.app-item.active{background:rgba(0,229,255,.05);border-left-color:var(--accent);}
.app-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.app-name{font-size:10px;color:var(--text);line-height:1.3;}
.app-item.active .app-name{color:var(--accent);}

/* MAIN PANEL */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.iframe-bar{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
.iframe-url{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);font-family:var(--mono);font-size:10px;
  padding:5px 10px;
}
.iframe-btn{
  padding:5px 12px;border:1px solid var(--border2);color:var(--accent);
  font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer;
  background:transparent;transition:.15s;
}
.iframe-btn:hover{background:rgba(0,229,255,.08);}

.iframe-wrap{flex:1;position:relative;background:#000;}
.iframe-wrap iframe{width:100%;height:100%;border:none;}

.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--dim);
}
.empty-state .big{font-size:11px;letter-spacing:3px;color:var(--muted);}
.empty-state .small{font-size:9px;letter-spacing:2px;}

/* FOOTER */
.footer{
  height:28px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;flex-shrink:0;
}
.footer-left{font-size:9px;color:var(--dim);letter-spacing:2px;display:flex;align-items:center;gap:6px;}
.footer-live{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--green);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3};}
.footer-right{font-size:9px;color:var(--dim);letter-spacing:1px;}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;">
    <div class="logo">TSM HUB</div>
    <div class="hub-badge">LIVE</div>
  </div>
  <div class="topbar-right">TSM ENTERPRISE PLATFORM</div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="search-wrap">
      <input id="app-search" type="text" placeholder="Search apps..." oninput="filterApps()">
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="app-count">
      <span id="app-count-num">0</span> apps &nbsp;
      <span id="filter-label">ALL</span>
    </div>
    <div class="app-list" id="app-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="iframe-bar">
      <div class="iframe-url" id="iframe-url-display">&nbsp;</div>
      <button class="iframe-btn" onclick="reloadFrame()">↺ Reload</button>
      <button class="iframe-btn" onclick="openExternal()">↗ Open</button>
    </div>
    <div class="iframe-wrap" id="iframe-wrap">
      <div class="empty-state" id="empty-state">
        <div class="big">SELECT AN APP</div>
        <div class="small">Click any app in the sidebar to preview</div>
      </div>
      <iframe id="main-frame" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    <div class="footer-live"><div class="live-dot"></div><span id="footer-app-name">Select an app</span></div>
  </div>
  <div class="footer-right">tsm-shell hub · tsm-shell.fly.dev</div>
</div>

<script>
const APPS = [
  // HEALTHCARE
  {sector:'Healthcare',name:'HonorHealth Command',url:'/html/honorhealth/index.html'},
  {sector:'Healthcare',name:'HC Billing',url:'/html/hc-billing/index.html'},
  {sector:'Healthcare',name:'HC Compliance',url:'/html/hc-compliance/index.html'},
  {sector:'Healthcare',name:'HC Financial',url:'/html/hc-financial/index.html'},
  {sector:'Healthcare',name:'HC Grants',url:'/html/hc-grants/index.html'},
  {sector:'Healthcare',name:'HC Insurance',url:'/html/hc-insurance/index.html'},
  {sector:'Healthcare',name:'HC Legal',url:'/html/hc-legal/index.html'},
  {sector:'Healthcare',name:'HC Medical',url:'/html/hc-medical/index.html'},
  {sector:'Healthcare',name:'HC Pharmacy',url:'/html/hc-pharmacy/index.html'},
  {sector:'Healthcare',name:'HC Strategist',url:'/html/hc-strategist/index.html'},
  {sector:'Healthcare',name:'HC Tax Prep',url:'/html/hc-taxprep/index.html'},
  {sector:'Healthcare',name:'HC Vendors',url:'/html/hc-vendors/index.html'},
  {sector:'Healthcare',name:'Banner Health',url:'/html/banner-health/index.html'},
  {sector:'Healthcare',name:'HealthOps BPO',url:'/html/healthops-bpo/index.html'},
  {sector:'Healthcare',name:'Healthcare Command',url:'/html/healthcare/index.html'},
  // INSURANCE
  {sector:'Insurance',name:'Insurance Command',url:'/html/tsm-insurance/index.html'},
  {sector:'Insurance',name:'AZ Agent Command',url:'/html/az-insurance/index.html'},
  {sector:'Insurance',name:'AZ Insurance Portal',url:'/html/az-ins/index.html'},
  {sector:'Insurance',name:'P&C Enterprise Command',url:'/html/pc-command/index.html'},
  // FINANCIAL
  {sector:'Financial',name:'Financial Command',url:'/html/financial-command/index.html'},
  {sector:'Financial',name:'Desert Financial',url:'/html/desert-financial/index.html'},
  {sector:'Financial',name:'Financial',url:'/html/financial/index.html'},
  {sector:'Financial',name:'Compliance',url:'/html/compliance/index.html'},
  {sector:'Financial',name:'Tax Intelligence',url:'/html/tax/index.html'},
  {sector:'Financial',name:'Zero Trust',url:'/html/zero-trust/index.html'},
  // REAL ESTATE
  {sector:'Real Estate',name:'Real Estate Command',url:'/html/real-estate/index.html'},
  {sector:'Real Estate',name:'Property Intelligence',url:'/html/property-intel/index.html'},
  {sector:'Real Estate',name:'Broker Dashboard',url:'/html/broker/index.html'},
  {sector:'Real Estate',name:'HOA Command',url:'/html/hoa/index.html'},
  {sector:'Real Estate',name:'RE Finance',url:'/html/re-finance/index.html'},
  {sector:'Real Estate',name:'RE Legal',url:'/html/re-legal/index.html'},
  // CONSTRUCTION
  {sector:'Construction',name:'Construction Command',url:'/html/construction-suite/index.html'},
  {sector:'Construction',name:'Project Intelligence',url:'/html/construction-suite/construction-wip.html'},
  {sector:'Construction',name:'Document Showcase',url:'/html/construction-suite/document-showcase.html'},
  {sector:'Construction',name:'Construction Pitch',url:'/html/construction-suite/construct-pitch.html'},
  // LEGAL
  {sector:'Legal',name:'Legal Command',url:'/html/legal/index.html'},
  {sector:'Legal',name:'Contract Intelligence',url:'/html/legal/contracts.html'},
  // EDUCATION
  {sector:'Education',name:'Education Command',url:'/html/education/index.html'},
  {sector:'Education',name:'District Intelligence',url:'/html/education/district.html'},
  // HOSPITALITY
  {sector:'Hospitality',name:'Hospitality Command',url:'/html/hospitality/index.html'},
  {sector:'Hospitality',name:'Hotel Intelligence',url:'/html/hospitality/hotel.html'},
  {sector:'Hospitality',name:'Revenue Management',url:'/html/hospitality/revenue.html'},
  // ENTERPRISE
  {sector:'Enterprise',name:'Executive Portal Live',url:'/html/executive-portal-live.html'},
  {sector:'Enterprise',name:'Strategist Command',url:'/html/strategist-index.html'},
  {sector:'Enterprise',name:'Suite Builder',url:'/html/suite-builder.html'},
  {sector:'Enterprise',name:'WIA Workforce Intelligence',url:'/html/wia.html'},
  {sector:'Enterprise',name:'Enterprise WIP Dashboard',url:'/html/wip-dashboard.html'},
  // DOCUMENT INTELLIGENCE
  {sector:'Document Intelligence',name:'DOC1 Enterprise Search',url:'/html/doc1-search.html'},
  {sector:'Document Intelligence',name:'Financial Doc Analysis',url:'/html/finops-suite/doc-analysis-tab.html'},
  {sector:'Document Intelligence',name:'Construction Doc Showcase',url:'/html/construction-suite/document-showcase.html'},
  {sector:'Document Intelligence',name:'Client Access Portal',url:'/html/client-access.html'},
  {sector:'Document Intelligence',name:'WIP Dashboard',url:'/html/wip-dashboard.html'},
  {sector:'Document Intelligence',name:'BPO Command Center',url:'/html/bpo/bpo-command-center.html'},
  // DEMO DECKS
  {sector:'Demo Decks',name:'Healthcare Demo Trail',url:'/html/healthcare/tsm-hc-demo-trail.html'},
  {sector:'Demo Decks',name:'Insurance Demo Trail',url:'/html/tsm-insurance/tsm-ins-demo-trail.html'},
  {sector:'Demo Decks',name:'FinOps Presentation',url:'/html/finops-suite/finops-presentation.html'},
  {sector:'Demo Decks',name:'TSM Financial Presentation',url:'/html/finops-suite/tsm-presentation.html'},
  {sector:'Demo Decks',name:'Construction Pitch',url:'/html/construction-suite/construct-pitch.html'},
];

const SECTORS = ['All','Deployed',...[...new Set(APPS.map(a=>a.sector))]];
let activeFilter = 'All';
let activeUrl = null;
let searchTerm = '';

function init(){
  // build filter tags
  const fb = document.getElementById('filter-bar');
  ['All','Deployed','Healthcare','Insurance','Financial','Real Estate','Construction','Legal','Education','Hospitality','Enterprise','Document Intelligence','Demo Decks'].forEach(s=>{
    const t = document.createElement('div');
    t.className = 'ftag' + (s==='All'?' active':'');
    t.textContent = s;
    t.onclick = ()=>{ activeFilter=s; document.querySelectorAll('.ftag').forEach(x=>x.classList.remove('active')); t.classList.add('active'); renderList(); };
    fb.appendChild(t);
  });
  renderList();
}

function filterApps(){
  searchTerm = document.getElementById('app-search').value.toLowerCase();
  renderList();
}

function getVisible(){
  return APPS.filter(a=>{
    const matchFilter = activeFilter==='All' || activeFilter==='Deployed' || a.sector===activeFilter;
    const matchSearch = !searchTerm || a.name.toLowerCase().includes(searchTerm) || a.sector.toLowerCase().includes(searchTerm);
    return matchFilter && matchSearch;
  });
}

function renderList(){
  const list = document.getElementById('app-list');
  list.innerHTML = '';
  const visible = getVisible();
  document.getElementById('app-count-num').textContent = visible.length;
  document.getElementById('filter-label').textContent = activeFilter.toUpperCase();

  // group by sector
  const grouped = {};
  visible.forEach(a=>{
    if(!grouped[a.sector]) grouped[a.sector]=[];
    grouped[a.sector].push(a);
  });

  Object.entries(grouped).forEach(([sector,apps])=>{
    const lbl = document.createElement('div');
    lbl.className = 'sector-label';
    lbl.textContent = sector;
    list.appendChild(lbl);
    apps.forEach(a=>{
      const item = document.createElement('div');
      item.className = 'app-item' + (a.url===activeUrl?' active':'');
      item.innerHTML = `<div class="app-dot"></div><div class="app-name">${a.name}</div>`;
      item.onclick = ()=>loadApp(a);
      list.appendChild(item);
    });
  });
}

function loadApp(a){
  activeUrl = a.url;
  renderList();
  document.getElementById('iframe-url-display').textContent = a.url;
  document.getElementById('footer-app-name').textContent = a.name;
  document.getElementById('empty-state').style.display = 'none';
  const frame = document.getElementById('main-frame');
  frame.style.display = 'block';
  frame.src = a.url;
}

function reloadFrame(){
  const frame = document.getElementById('main-frame');
  if(frame.src) frame.src = frame.src;
}

function openExternal(){
  if(activeUrl) window.open(activeUrl,'_blank');
}

init();
</script>
</body>
</html>
