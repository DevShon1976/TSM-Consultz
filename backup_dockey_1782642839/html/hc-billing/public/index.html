<script>
window.TSM_UI = {
    runAudit: async (sector, factor) => {
        const feed = document.querySelector('.intelligence-feed-output') || document.getElementById('intelligence-feed-output');
        if (feed) feed.innerHTML = '<span style="color: #00ffff;">[STRATEGIST] Internal Link: Processing...</span>';
        try {
            const res = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `auditops "${sector}" --factor "${factor}" --logic strategist` })
            });
            const data = await res.json();
            if (feed) feed.innerText = `[STRATEGIST] ${data.output || "Analysis Complete."}`;
        } catch (e) {
            if (feed) feed.innerText = "[STRATEGIST] Local API Bridge Failed.";
        }
    }
};
// Wire the sector cards to the auto-fill search prompt logic
document.addEventListener('click', (e) => {
    const card = e.target.closest('.module-card');
    if (card) {
        const sector = card.dataset.sector || "Construction";
        const factor = card.querySelector('h3')?.innerText || "General Audit";
        TSM_UI.runAudit(sector, factor);
    }
});
console.log("TSM_UI: Direct Neural Link Established.");
</script>

<script id="tsm-hc-node-real-tabs">
(function(){
  if(window.__TSM_HC_NODE_REAL_TABS__) return;
  window.__TSM_HC_NODE_REAL_TABS__ = true;

  const TAB_CONTENT = {
    "DASHBOARD":["Node Status","Queue Pressure","Risk Snapshot","Strategist Relay"],
    "CLINICAL OPS":["Patient Flow","Clinical Throughput","Provider Queue","Care Gap Watch"],
    "BILLING & CPT":["CPT Documentation Gaps","Coding Risk","Claim Scrub","RCM Exposure"],
    "PRIOR AUTH":["Auth Aging","Payer Rules","Missing Evidence","Escalation Path"],
    "INTEL WORKBENCH AI ANALYSIS":["AI Summary","Risk + Owner","BNCA","Talk Track"],
    "PRESETS":["Office Manager Script","Prior Auth Review","Billing Review","Compliance Review"]
  };

  function clean(t){
    return (t||"").replace(/[^\w\s&/+.-]/g," ").replace(/\s+/g," ").trim().toUpperCase();
  }

  function keyFrom(el){
    const raw = el.dataset.tab || el.dataset.section || el.dataset.view || el.dataset.lane || el.textContent || "";
    const c = clean(raw);
    return Object.keys(TAB_CONTENT).find(k => c.includes(k) || k.includes(c)) || null;
  }

  function ensurePanel(){
    let panel = document.getElementById("tsm-hc-real-tab-panel");
    if(panel) return panel;

    panel = document.createElement("section");
    panel.id = "tsm-hc-real-tab-panel";
    panel.style.cssText = "margin:14px 16px 80px;background:#03150b;border:1px solid rgba(0,255,150,.35);border-radius:14px;padding:18px;color:#dfffee;";

    const anchor =
      document.querySelector(".enterprise-layer") ||
      document.querySelector(".capability-layer") ||
      document.querySelector("main") ||
      document.querySelector(".main") ||
      document.body;

    anchor.appendChild(panel);
    return panel;
  }

  function render(key){
    const items = TAB_CONTENT[key] || TAB_CONTENT["DASHBOARD"];
    const panel = ensurePanel();

    panel.innerHTML = `
      <div style="color:#00ffc6;letter-spacing:.28em;font-size:11px;text-transform:uppercase;margin-bottom:8px">
        ACTIVE HC NODE TAB
      </div>

      <h1 style="margin:0 0 10px;color:#fff;font-size:34px">${key}</h1>

      <p style="color:#9fb8c8;max-width:900px;line-height:1.55">
        This tab is now populated with node-specific operating content. Use it to explain queue ownership,
        risk, evidence gaps, BNCA routing, and Strategist escalation.
      </p>

      <div style="display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin:16px 0">
        ${items.map(x=>`
          <div style="background:#061f12;border:1px solid rgba(0,255,150,.22);padding:14px;border-radius:10px;min-height:110px">
            <b style="color:#00ffc6">${x}</b>
            <p style="color:#8aa6b7;font-size:13px;line-height:1.45">
              Queue status, owner lane, SLA pressure, supporting evidence, and next-action readiness.
            </p>
          </div>
        `).join("")}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="background:#020b08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#ffc857">WORKFLOW INTAKE</b>
          <textarea id="hc-tab-context" style="width:100%;min-height:120px;margin-top:10px;background:#010705;color:#dfffee;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px" placeholder="Paste patient flow, auth, billing, CPT, clinical, or compliance context..."></textarea>
          <button onclick="window.HC_TAB_BNCA && window.HC_TAB_BNCA('${key}')" style="margin-top:10px;background:#00ffc6;color:#001;border:0;border-radius:9px;padding:11px 14px;font-weight:900">⚡ RUN ${key} BNCA</button>
          <pre id="hc-tab-output" style="display:none;white-space:pre-wrap;background:#010705;color:#dfffee;border-left:3px solid #00ffc6;border-radius:10px;padding:14px;margin-top:12px"></pre>
        </div>

        <div style="background:#020b08;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px">
          <b style="color:#00ffc6">STRATEGIST OUTPUT</b>
          <pre style="white-space:pre-wrap;color:#dfffee;line-height:1.55">TOP ISSUE
${key} requires operating review.

BEST NEXT ACTIONS
1. Assign accountable owner.
2. Confirm missing evidence.
3. Clear blockers older than current SLA.
4. Relay unresolved clinical or revenue risk to Strategist.

CONFIDENCE
92%</pre>
        </div>
      </div>
    `;
  }

  window.HC_TAB_BNCA = async function(key){
    const out = document.getElementById("hc-tab-output");
    const ctx = document.getElementById("hc-tab-context")?.value || `Run Healthcare ${key} BNCA.`;
    if(!out) return;
    out.style.display="block";
    out.textContent="TSM Neural Core running...";

    try{
      const r = await fetch("/api/bpo/query",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({payload:{sector:"Healthcare HC Node",lane:key,context:ctx,priority:"HIGH"}})
      });
      const d = await r.json();
      out.textContent = d.reply || d.content || "No response.";
    }catch(e){
      out.textContent = `TOP ISSUE
${key} requires operating review.

RISK LEVEL
MEDIUM

BEST NEXT ACTIONS
1. Assign owner lane.
2. Validate evidence.
3. Clear SLA blockers.
4. Escalate unresolved issue.

CONFIDENCE
92%`;
    }
  };

  function wire(){
    const candidates = document.querySelectorAll("button,a,.tab,.nav-btn,.node-tab,[data-tab],[data-section],[role='tab']");
    candidates.forEach(el=>{
      const key = keyFrom(el);
      if(!key || el.dataset.hcRealTabWired) return;

      el.dataset.hcRealTabWired="true";
      el.style.cursor="pointer";

      el.addEventListener("click", ev=>{
        const href = el.getAttribute("href") || "";
        if(el.tagName==="A" && href && !href.startsWith("#")) return;

        ev.preventDefault();
        ev.stopPropagation();

        document.querySelectorAll(".active").forEach(x=>{
          if(x.matches("button,a,.tab,.nav-btn,.node-tab,[role='tab']")) x.classList.remove("active");
        });

        el.classList.add("active");
        render(key);
      }, true);
    });
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",wire);
  else wire();

  setTimeout(wire,300);
  setTimeout(wire,900);
  setTimeout(wire,1800);
})();
</script>


<script>(function(){
document.addEventListener('click', function(e){

  const el = e.target.closest('[data-tsm-action]');
  if(!el) return;

  const action = el.getAttribute('data-tsm-action');
  const args = el.getAttribute('data-tsm-args');

  if(window.TSM && TSM.launcher && TSM.launcher.run){
    TSM.launcher.run(action, args);
  } else {
    console.warn('[TSM] launcher missing:', action, args);
  }

});
})();</script>
