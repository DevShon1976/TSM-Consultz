<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSM Mortgage Rescue Pack Library</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070b10;--panel:#0e151c;--panel-border:#1c2a35;
    --cyan:#00e5ff;--gold:#ffc857;--amber:#ff9f43;--red:#ff5470;--green:#3ddc97;
    --text:#cfe8ee;--dim:#5d7a87;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(circle at top, #0c1620 0%, #060a0e 70%);
    color:var(--text);font-family:'Rajdhani',sans-serif;padding:24px;min-height:100vh;
  }
  .header{text-align:center;margin-bottom:28px;}
  .header h1{
    font-family:'Orbitron',sans-serif;font-size:24px;letter-spacing:3px;
    color:var(--cyan);text-shadow:0 0 16px rgba(0,229,255,.4);
  }
  .header p{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);margin-top:8px;}

  .tier{margin-bottom:30px;max-width:1200px;margin-left:auto;margin-right:auto;}
  .tier-label{
    font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;
    color:var(--gold);margin-bottom:12px;padding-bottom:6px;
    border-bottom:1px solid var(--panel-border);
  }
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:12px;
  }
  .card{
    position:relative;
    background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;
    padding:14px;cursor:pointer;transition:.2s;text-decoration:none;color:var(--text);
    display:flex;flex-direction:column;gap:6px;
  }
  .card:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,229,255,.2);transform:translateY(-2px);}
  .card.exec{border-color:rgba(255,200,87,.4);}
  .card.exec:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(255,200,87,.25);}
  .card .icon{font-size:26px;}
  .card .label{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px;color:var(--text);}
  .card .sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);}
  .badge{
    font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);
    border:1px solid rgba(255,200,87,.4);border-radius:4px;padding:1px 6px;
    align-self:flex-start;
  }

  /* ——— preview icon on each card ——— */
  .card .preview-btn{
    position:absolute;top:10px;right:10px;
    width:22px;height:22px;border-radius:50%;
    background:rgba(0,0,0,.35);border:1px solid var(--panel-border);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--dim);transition:.15s;
  }
  .card .preview-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08);}

  /* ——— doc viewer modal ——— */
  .doc-viewer-overlay{
    position:fixed;inset:0;background:rgba(2,6,10,.78);
    display:none;align-items:center;justify-content:center;z-index:999;padding:24px;
  }
  .doc-viewer-overlay.open{display:flex;}
  .doc-viewer{
    background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;
    max-width:680px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,.5);
  }
  .doc-viewer-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--panel-border);}
  .doc-viewer-head .title{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--text);}
  .doc-viewer-head .close-top{
    font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--red);
    border:1px solid rgba(255,84,112,.4);border-radius:4px;padding:4px 10px;cursor:pointer;background:rgba(255,84,112,.06);
  }
  .doc-viewer-head .close-top:hover{background:rgba(255,84,112,.15);}

  .doc-viewer-body{padding:18px 20px;overflow-y:auto;}

  .field-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:10px;margin-bottom:16px;}
  .field-cell{background:rgba(255,255,255,.02);border:1px solid var(--panel-border);border-radius:6px;padding:8px 10px;}
  .field-cell .f-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}
  .field-cell .f-value{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text);word-break:break-word;}

  .content-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
  .content-box{
    background:rgba(0,0,0,.25);border:1px solid var(--panel-border);border-radius:6px;padding:12px 14px;
    font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.6;color:var(--text);
    white-space:pre-wrap;max-height:240px;overflow-y:auto;
  }
  .doc-viewer-empty{color:var(--dim);text-align:center;padding:30px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;}

  .doc-viewer-actions{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--panel-border);}
  .doc-viewer-actions .primary-action{
    flex:1;background:rgba(255,200,87,.1);border:1px solid var(--gold);color:var(--gold);
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:6px;
    padding:10px;cursor:pointer;text-align:center;transition:.15s;
  }
  .doc-viewer-actions .primary-action:hover{background:rgba(255,200,87,.2);}
  .doc-viewer-actions .close-bottom{
    background:rgba(255,255,255,.03);border:1px solid var(--panel-border);color:var(--dim);
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:6px;
    padding:10px 16px;cursor:pointer;
  }
  .doc-viewer-actions .close-bottom:hover{color:var(--text);border-color:var(--cyan);}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ MORTGAGE RESCUE PACK LIBRARY</h1>
  <p>24 packs · click any card to run analysis</p>
</div>

<div id="tiers"></div>

<!-- ——— doc viewer modal ——— -->
<div class="doc-viewer-overlay" id="docViewerOverlay">
  <div class="doc-viewer">
    <div class="doc-viewer-head">
      <span class="title" id="docViewerTitle">DOCUMENT PREVIEW</span>
      <span class="close-top" id="docViewerCloseTop">× CLOSE</span>
    </div>
    <div class="doc-viewer-body">
      <div class="field-grid" id="docViewerFields"></div>
      <div class="content-label">DOCUMENT CONTENT</div>
      <div class="content-box" id="docViewerBody"></div>
    </div>
    <div class="doc-viewer-actions">
      <div class="primary-action" id="docViewerLaunch">⚡ RUN THIS PACK</div>
      <div class="close-bottom" id="docViewerCloseBottom">× CLOSE</div>
    </div>
  </div>
</div>

<script src="pack-configs.js"></script>
<script>
const TIERS = [
  { label: 'TIER 2 — MORTGAGE OPERATIONS RESCUE PACKS', keys: ['loan-denial','credit-event','employment-change','asset-sourcing','income-stability','fraud-investigation'] },
  { label: 'TIER 3 — PRODUCT-SPECIFIC RESCUE PACKS', keys: ['fha-rescue','va-rescue','usda-rescue','jumbo-rescue','dscr-investor','condo-rescue','new-construction'] },
  { label: 'TIER 4 — COMPLIANCE RESCUE PACKS', keys: ['trid-rescue','respa-rescue','hmda-audit'] },
  { label: 'TIER 6 — REAL ESTATE TRANSACTION PACKS', keys: ['hoa-risk','seller-risk','contract-risk'] },
  { label: 'TIER 7 — CLOSING & SECONDARY MARKET PACKS', keys: ['ctc-fast-track','postclose-audit'] },
  { label: 'TIER 8 — EXECUTIVE AI PACKS', keys: ['deal-killer','transaction-autopsy','closing-probability','mortgage-ops-scorecard'] },
];

const container = document.getElementById('tiers');

// ——— ACTIVE DOC RELAY ———

const RELAY_KEYS = [
  'TSM_RE_WAR_RELAY',
  'TSM_CONSTRUCTION_WAR_RELAY',
  'TSM_INS_WAR_RELAY'
];

function getRelayData(){

  // Check all relay storage keys first
  for(const k of RELAY_KEYS){

    try{

      const raw = sessionStorage.getItem(k);

      if(raw){

        try{
          return JSON.parse(raw);
        }catch(e){
          // Handle plain text values
          return { docText: raw };
        }

      }

    }catch(e){}

  }

  // Fall back to opener document
  try{

    if(window.opener && window.opener.document){

      const dp = window.opener.document.getElementById('docPaste');

      if(dp && dp.value){
        return { docText: dp.value };
      }

    }

  }catch(e){}

  return null;

}

// ——— DOC VIEWER ———
const docViewerOverlay = document.getElementById('docViewerOverlay');
const docViewerTitle = document.getElementById('docViewerTitle');
const docViewerFields = document.getElementById('docViewerFields');
const docViewerBody = document.getElementById('docViewerBody');
const docViewerLaunch = document.getElementById('docViewerLaunch');
let pendingPackKey = null;

function renderFieldGrid(relay){
  const skip = ['docText','analysis'];
  const entries = Object.entries(relay).filter(([k,v]) => !skip.includes(k) && v !== undefined && v !== null && v !== '');
  docViewerFields.innerHTML = entries.slice(0,8).map(([k,v]) => `
    <div class="field-cell">
      <div class="f-label">${k}</div>
      <div class="f-value">${v}</div>
    </div>`).join('');
}

function openDocViewer(packKey){
  pendingPackKey = packKey;
  const cfg = TSM_PACK_CONFIGS[packKey];
  const relay = getRelayData();

  if(relay){
    const label = relay.fileName || relay.docType || (relay.docText ? 'Document text from active session' : 'Active file');
    docViewerTitle.textContent = label;
    renderFieldGrid(relay);
    docViewerBody.textContent = relay.docText || relay.analysis || JSON.stringify(relay, null, 2);
  } else {
    docViewerTitle.textContent = 'NO RELAY DATA';
    docViewerFields.innerHTML = '';
    docViewerBody.innerHTML = '<div class="doc-viewer-empty">⚠ No relay data found — pack will run on general inputs only</div>';
  }

  docViewerLaunch.textContent = '⚡ RUN ' + (cfg ? cfg.title.toUpperCase() : 'THIS PACK');
  docViewerOverlay.classList.add('open');
}

function closeDocViewer(){
  docViewerOverlay.classList.remove('open');
  pendingPackKey = null;
}

document.getElementById('docViewerCloseTop').addEventListener('click', closeDocViewer);
document.getElementById('docViewerCloseBottom').addEventListener('click', closeDocViewer);
docViewerOverlay.addEventListener('click', e => { if (e.target === docViewerOverlay) closeDocViewer(); });
docViewerLaunch.addEventListener('click', () => { if (pendingPackKey) window.location.href = 'pack-engine.html?pack=' + pendingPackKey; });

// ——— CARD GRID ———
TIERS.forEach(tier => {
  const tierDiv = document.createElement('div');
  tierDiv.className = 'tier';
  tierDiv.innerHTML = `<div class="tier-label">${tier.label}</div>`;
  const grid = document.createElement('div');
  grid.className = 'grid';

  tier.keys.forEach(key => {
    const cfg = TSM_PACK_CONFIGS[key];
    if(!cfg) return;
    const a = document.createElement('a');
    a.href = 'pack-engine.html?pack=' + key;
    a.className = 'card' + (cfg.isExecutive ? ' exec' : '');
    a.innerHTML = `
      <div class="icon">${cfg.icon}</div>
      <div class="label">${cfg.title}</div>
      <div class="sub">${cfg.subtitle}</div>
      ${cfg.isExecutive ? '<div class="badge">EXECUTIVE</div>' : ''}
      <span class="preview-btn" title="Preview active document">👁</span>
    `;
    a.querySelector('.preview-btn').addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      openDocViewer(key);
    });
    grid.appendChild(a);
  });

  tierDiv.appendChild(grid);
  container.appendChild(tierDiv);
});
</script>

<script>
(function(){
const MLO_CARDS=[
  {f:"RESPA",b:"Real Estate Settlement Procedures Act (Reg X, CFPB). Bans kickbacks and referral fees, restricts escrow overages, standardizes HUD-1 settlement costs."},
  {f:"TILA",b:"Truth in Lending Act (Reg Z, CFPB). Mandates cost-of-credit disclosures, governs advertising, Right of Rescission on refinances, and loan originator compensation."},
  {f:"ECOA",b:"Equal Credit Opportunity Act (Reg B, CFPB). Bars discrimination on 9 protected classes; requires Notice of Adverse Action within 30 days."},
  {f:"FCRA",b:"Fair Credit Reporting Act (Reg V, FTC/CFPB). Governs credit reporting agencies; grants consumers access and dispute rights."},
  {f:"FACTA",b:"Fair & Accurate Credit Transactions Act — amends FCRA. Identity theft prevention, secure document shredding, Red Flags Rule for financial institutions."},
  {f:"HMDA",b:"Home Mortgage Disclosure Act (Reg C, CFPB). Requires lenders to file LAR data used to detect predatory lending, redlining, and fair lending violations."},
  {f:"MAP Rule",b:"Mortgage Acts and Practices Rule (Reg N, CFPB). Prohibits deceptive or misleading mortgage advertising practices."},
  {f:"HPA",b:"Homeowners Protection Act. Requires automatic PMI cancellation when LTV reaches 78% on conventional loans; borrower-requested cancellation at 80%."},
  {f:"GLBA",b:"Gramm-Leach-Bliley Act. Safeguards nonpublic personal information via the Safeguards Rule (FTC) and Privacy Rule (annual privacy notices)."},
  {f:"BSA / AML",b:"Bank Secrecy Act / Anti-Money Laundering. Requires SARs for suspicious activity, CTRs for cash transactions over $10,000, and CIP procedures."},
  {f:"PITI",b:"Principal, Interest, Taxes, and Insurance — the full monthly housing obligation used in qualifying ratios."},
  {f:"Front-end ratio",b:"PITI divided by gross monthly income. FHA guideline: 31%; conventional: 28%."},
  {f:"Back-end ratio",b:"PITI plus all long-term monthly debts, divided by gross monthly income. FHA: 43%; conventional: 36–45%."},
  {f:"Qualified Mortgage (QM)",b:"No negative amortization, no interest-only, term ≤30 years, points and fees ≤3%. Carries safe-harbor protection from ability-to-repay liability."},
  {f:"ATR Rule",b:"Ability-to-Repay Rule (Reg Z). Lenders must make a good-faith determination that a borrower can repay before originating a residential mortgage."},
  {f:"Par Rate",b:"The baseline interest rate at which the lender neither charges discount points nor offers lender credits."},
  {f:"Discount Points",b:"Prepaid interest paid at closing to permanently lower the note rate. 1 point = 1% of loan amount. Each point typically reduces rate by 0.125–0.25%."},
  {f:"YSP / Lender Credit",b:"Yield Spread Premium / Lender Credit — a credit toward closing costs in exchange for the borrower accepting a higher interest rate."},
  {f:"AZ Record Retention",b:"Arizona mortgage licensees must retain all books, accounts, and records for 5 years from final entry or loan closing date."},
  {f:"AZ Felony Bar",b:"A felony conviction within 7 years disqualifies an AZ MLO applicant. Felonies involving fraud, breach of trust, dishonesty, or money laundering are a permanent bar."},
  {f:"NMLS",b:"Nationwide Multistate Licensing System. All MLOs must register and maintain a unique identifier displayed on all loan documents and advertising."},
  {f:"SAFE Act",b:"Secure and Fair Enforcement for Mortgage Licensing Act. Established federal minimum standards for MLO licensing and the NMLS system."},
  {f:"Changed Circumstance",b:"A valid event allowing re-disclosure of a revised Loan Estimate. Includes natural disasters, new information about the borrower, or borrower-requested changes."},
  {f:"3-7-3 Rule (TRID)",b:"Loan Estimate must be delivered within 3 business days of application; closing cannot occur until 7 business days after LE delivery; CD must be delivered 3 business days before closing."},
  {f:"Zero Tolerance Bucket",b:"TRID fees that cannot increase at all between LE and CD: lender charges, transfer taxes, and fees for required services where the borrower used the lender's list."},
  {f:"10% Tolerance Bucket",b:"TRID fees that may increase up to 10% cumulatively: recording fees and charges for required services where the borrower chose their own provider."},
  {f:"Right of Rescission",b:"TILA right allowing borrowers to cancel a non-purchase refinance on their primary residence within 3 business days of consummation or disclosure delivery."},
  {f:"DSCR",b:"Debt Service Coverage Ratio. Annual NOI divided by annual debt service. DSCR ≥1.25x is typically required for investment property loans."},
  {f:"LTV",b:"Loan-to-Value Ratio. Loan amount divided by appraised value or purchase price (whichever is lower). Determines PMI requirements, pricing, and max loan eligibility."},
  {f:"DTI",b:"Debt-to-Income Ratio. Total monthly debt obligations divided by gross monthly income. Primary qualification metric for all residential mortgage programs."},
  {f:"AZ Advertising Rule",b:"Every AZ-targeted ad must show company name, license number, and NMLS Unique Identifier. Ad samples must be retained for 2 years from last publication."},
  {f:"FHA MIP",b:"Mortgage Insurance Premium. FHA requires upfront MIP (1.75% of loan) plus annual MIP (0.15–0.75% depending on LTV and term) for the life of the loan if LTV >90%."},
  {f:"VA Funding Fee",b:"One-time fee charged by VA in lieu of mortgage insurance. Ranges from 1.25% to 3.3% based on down payment, loan type, and whether first use or subsequent use."},
  {f:"USDA Guarantee Fee",b:"USDA Rural Development charges 1% upfront guarantee fee plus 0.35% annual fee. No down payment required; income and geographic eligibility limits apply."},
  {f:"Prepayment Penalty",b:"A fee charged when a borrower pays off a loan early. QM loans cannot have prepayment penalties beyond 3 years. High-cost loans cannot have them at all."},
  {f:"Red Flags Rule",b:"FACTA requirement for financial institutions to implement an Identity Theft Prevention Program to detect, prevent, and mitigate identity theft in covered accounts."},
  {f:"GFE vs. LE",b:"Good Faith Estimate was the pre-TRID disclosure (before Oct 2015). It was replaced by the Loan Estimate, which uses standardized format and strict tolerance rules."},
  {f:"HUD-1 vs. CD",b:"HUD-1 Settlement Statement was replaced by the Closing Disclosure in Oct 2015 under TRID. CD must be delivered 3 business days before consummation."},
  {f:"Adverse Action Notice",b:"Required under ECOA and FCRA within 30 days of a completed application. Must state specific reasons for denial and credit score disclosure if a score was used."},
  {f:"BRRRR Strategy",b:"Buy, Rehab, Rent, Refinance, Repeat — an investment strategy using a cash-out refinance after stabilization to recycle capital into the next acquisition."}
];

const MLO_SCENARIOS=[
  {title:"Title insurance referral check",desc:"A seller insists they will only sell the house to the buyer if the buyer agrees to use Mesa Elite Title Services. The seller has an indirect ownership interest in this title firm.",violation:"RESPA Section 9 — title steering violation",action:"A seller cannot condition a sale on use of a specific title company unless the seller pays 100% of both the owner's and lender's title insurance policies. Flag as non-compliant immediately.",penalty:"Treble damages — 3× the cost of all title charges — as civil liability to the buyer."},
  {title:"Closing disclosure fee tolerance breach",desc:"Comparing the final Closing Disclosure to the original Loan Estimate reveals the lender-controlled processing fee increased by $250 at final settlement due to extra file handling.",violation:"Zero tolerance fee violation (TRID)",action:"Lender-controlled fees are in the zero tolerance bucket — they cannot increase. Issue a cure or refund for the full $250 overage within 60 days of consummation.",penalty:"Lender restitution for the full variance amount; potential CFPB examination findings."},
  {title:"Suspicious deposit verification",desc:"A self-employed borrower provides two months of bank statements. A $15,000 cash deposit appears exactly 3 days before the application date with no identifiable source or paper trail.",violation:"Asset seasoning / potential straw buyer or mortgage fraud flag",action:"Trigger a file freeze. Require a fully documented gift letter with donor bank trail, or exclude the $15,000 entirely from qualifying reserves. File a SAR if fraud is suspected.",penalty:"SAFE Act civil penalty of $25,000–$30,000+ per occurrence; potential criminal referral."},
  {title:"AZ record retention failure",desc:"An Arizona mortgage broker closes its physical office and migrates historical file archives to encrypted offline storage, scheduling auto-deletion 36 months after closing.",violation:"Arizona DIFI record retention breach",action:"Extend the retention schedule to 60 months minimum. Arizona mandates 5 years of retention for all mortgage transaction logs and customer files from the date of final entry.",penalty:"State administrative fines, civil penalties, or suspension/revocation of license."},
  {title:"Referral fee arrangement",desc:"A real estate agent refers all her buyer clients to a specific lender in exchange for $200 gift cards provided after each closed loan.",violation:"RESPA Section 8(a) — anti-kickback / thing-of-value violation",action:"Any item of value exchanged for a referral of mortgage business is illegal under RESPA unless it is payment for actual services rendered at fair market value. Both parties are exposed.",penalty:"Criminal fines up to $10,000 and up to 1 year imprisonment per violation."},
  {title:"Adverse action timing failure",desc:"A borrower submits a complete mortgage application on March 1. The lender issues a denial letter on April 5 citing insufficient income.",violation:"ECOA adverse action timing violation",action:"ECOA requires adverse action notice within 30 days of a complete application. April 5 is 35 days after March 1 — the lender is 5 days late and must immediately issue a corrected notice with FCRA score disclosure.",penalty:"ECOA actual damages, punitive damages up to $10,000, plus attorney fees in individual actions."},
  {title:"NMLS identifier omission",desc:"A licensed MLO runs a social media ad for a 30-year fixed rate offer. The ad shows the company logo and phone number but omits the MLO's NMLS Unique Identifier.",violation:"SAFE Act / MAP Rule NMLS disclosure violation",action:"All mortgage advertising — including social media — must display the MLO's NMLS Unique Identifier. Remove the non-compliant ad immediately and republish with the required identifier.",penalty:"State regulatory fine; potential NMLS license condition or suspension."},
  {title:"PMI cancellation denial",desc:"A conventional loan borrower reaches 80% LTV through regular payments and formally requests PMI cancellation in writing. The servicer denies the request, citing 'internal policy.'",violation:"Homeowners Protection Act (HPA) violation",action:"Under HPA, the servicer must cancel PMI upon a borrower's written request when LTV reaches 80% based on original value, provided the borrower has good payment history and no subordinate liens. Denial is a HPA violation.",penalty:"Actual damages, statutory damages, court costs, and attorney fees under HPA."}
];

const MLO_QUIZ=[
  {q:"A mortgage broker pays 50% of a referral partner's ad budget regardless of leads generated. This most likely violates:",choices:["RESPA Section 8 (anti-kickback)","TILA advertising rules","ECOA adverse action rules","HMDA reporting rules"],a:0,ex:"Covering a partner's overhead without fair-market-value exchange for actual services rendered is a thing-of-value violation under RESPA Section 8 — fines up to $10,000 and up to 1 year imprisonment per violation."},
  {q:"Under TRID, what is the minimum number of business days between delivery of the initial Loan Estimate and consummation?",choices:["3","4","7","10"],a:2,ex:"The 3-7-3 rule requires at least 7 business days between initial LE delivery and consummation."},
  {q:"A valid Changed Circumstance occurs after the initial LE is sent. Within how many business days must the revised LE be issued?",choices:["1","3","5","7"],a:1,ex:"Revised Loan Estimates must be delivered within 3 business days of a valid Changed Circumstance event."},
  {q:"Under ECOA, what is the maximum window to notify an applicant of a credit decision after a completed application?",choices:["10 days","20 days","30 days","45 days"],a:2,ex:"ECOA requires adverse action or approval notice within 30 days of receiving a completed application."},
  {q:"A lender fails to deliver the Notice of Right to Cancel to a co-owner on a primary residence refinance. The 3-day rescission window:",choices:["Stays the same","Extends to 30 days","Extends to 1 year","Extends to 3 years"],a:3,ex:"Failure to deliver required rescission notices or material disclosures extends the rescission window to 3 years under TILA."},
  {q:"Which feature would disqualify a loan from Qualified Mortgage (QM) status?",choices:["15-year term","Interest-only payments","Fixed interest rate","Escrowed property taxes"],a:1,ex:"QM loans cannot have interest-only payments, negative amortization, balloon payments (with limited exceptions), terms over 30 years, or points and fees over 3%."},
  {q:"Under the Homeowners Protection Act, when must a servicer automatically cancel PMI on a conventional loan?",choices:["When LTV reaches 80%","When LTV reaches 78%","At the midpoint of the loan term","After 5 years of on-time payments"],a:1,ex:"HPA requires automatic PMI cancellation when the principal balance is scheduled to reach 78% of the original property value — not 80%, which is the borrower-requested threshold."},
  {q:"Arizona mortgage licensees must retain books, accounts, and records for a minimum of:",choices:["2 years","3 years","5 years","7 years"],a:2,ex:"Arizona law mandates 5 years of record retention from the date of final entry or loan closing."},
  {q:"Under Arizona MLO licensing rules, a felony conviction involving fraud or dishonesty results in:",choices:["A 2-year wait","A 7-year wait","A permanent bar","No impact if fully disclosed"],a:2,ex:"Arizona permanently bars individuals with felony convictions involving fraud, breach of trust, dishonesty, or money laundering from obtaining an MLO license."},
  {q:"One discount point equals what percentage of the loan amount?",choices:["0.1%","0.5%","1%","5%"],a:2,ex:"One discount point equals 1% of the total loan amount, prepaid at closing to permanently buy down the interest rate."},
  {q:"PITI stands for:",choices:["Principal, Interest, Taxes, Insurance","Principal, Interest, Term, Income","Payment, Interest, Tax, Investment","Principal, Income, Tax, Insurance"],a:0,ex:"PITI — Principal, Interest, Taxes, and Insurance — represents the full monthly housing obligation used to calculate the front-end qualifying ratio."},
  {q:"What is the FHA upfront Mortgage Insurance Premium (MIP) rate for most borrowers?",choices:["0.55%","1.0%","1.75%","2.25%"],a:2,ex:"FHA charges an upfront MIP of 1.75% of the base loan amount, which can be financed into the loan. Annual MIP varies by LTV and term."},
  {q:"The Ability-to-Repay (ATR) rule requires lenders to consider how many specific financial factors?",choices:["4","6","8","10"],a:2,ex:"The ATR rule under Reg Z requires consideration of 8 factors: income, assets, employment, payment amount, other obligations, credit history, DTI, and mortgage-related obligations."},
  {q:"Under the BSA, a Cash Transaction Report (CTR) must be filed for cash transactions exceeding:",choices:["$5,000","$8,000","$10,000","$25,000"],a:2,ex:"The Bank Secrecy Act requires filing a CTR for any cash transaction exceeding $10,000 in a single business day, even if conducted in multiple transactions."},
  {q:"HMDA data is primarily used to:",choices:["Calculate a borrower's DTI ratio","Detect redlining and fair lending violations","Set conforming loan limits","Determine PMI cancellation timing"],a:1,ex:"HMDA requires lenders to collect and report LAR data so regulators can identify patterns of redlining, predatory lending, and fair lending law violations."},
  {q:"A borrower requests PMI cancellation in writing when their LTV reaches 80%. Under HPA, the servicer must:",choices:["Cancel PMI immediately upon request","Cancel PMI if the borrower has a good payment history and no subordinate liens","Deny the request and wait for automatic cancellation at 78%","Require a new appraisal before cancellation"],a:1,ex:"Under HPA, the servicer must cancel PMI on a written request at 80% LTV if the borrower has a good payment history, is current on the loan, and has no subordinate liens."},
  {q:"The MAP Rule (Reg N) prohibits:",choices:["Negative amortization on QM loans","Deceptive or misleading mortgage advertising","Kickbacks for referral of settlement services","PMI on loans above 80% LTV"],a:1,ex:"The Mortgage Acts and Practices Rule (Reg N, CFPB) specifically prohibits deceptive, misleading, or false representations in mortgage advertising across all media."},
  {q:"Which loan type charges a Guarantee Fee instead of mortgage insurance?",choices:["FHA","VA","USDA","Jumbo"],a:2,ex:"USDA Rural Development loans charge a 1% upfront guarantee fee and 0.35% annual fee in lieu of traditional mortgage insurance. No down payment is required."},
  {q:"Under FCRA, how long does negative credit information (other than bankruptcy) remain on a consumer credit report?",choices:["3 years","5 years","7 years","10 years"],a:2,ex:"Most negative credit information remains on a consumer credit report for 7 years under FCRA. Chapter 7 bankruptcy may remain for 10 years."},
  {q:"The SAFE Act established which system for MLO licensing?",choices:["CFPB","NMLS","RESPA","HMDA"],a:1,ex:"The Secure and Fair Enforcement for Mortgage Licensing Act established federal minimum standards for state MLO licensing and created the Nationwide Multistate Licensing System (NMLS)."}
];

let mloIdx=0, mloScore=0, mloAnswered=[];

function mloTab(t,btn){
  document.querySelectorAll('.mlo-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.mlo-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('mlo-'+t).classList.add('active');
  btn.classList.add('active');
}

function mloShowCard(){
  const c=MLO_CARDS[mloIdx];
  document.getElementById('mloFront').textContent=c.f;
  document.getElementById('mloBack').textContent=c.b;
  document.getElementById('mloCounter').textContent=(mloIdx+1)+' / '+MLO_CARDS.length;
  document.getElementById('mloCardInner').classList.remove('flipped');
}

function mloMove(d){
  mloIdx=(mloIdx+d+MLO_CARDS.length)%MLO_CARDS.length;
  mloShowCard();
}

function mloBuilScenarios(){
  document.getElementById('mlo-scenario').innerHTML=MLO_SCENARIOS.map((s,i)=>`
    <div class="mlo-sc">
      <div class="mlo-sc-title">${s.title.toUpperCase()}</div>
      <div class="mlo-sc-desc">${s.desc}</div>
      <button class="mlo-sc-reveal" onclick="mloReveal(${i})">▶ REVEAL ANALYSIS</button>
      <div class="mlo-sc-answer" id="msa${i}">
        <span>VIOLATION:</span> ${s.violation}<br><br>
        <span>CORRECT ACTION:</span> ${s.action}<br><br>
        <span>PENALTY EXPOSURE:</span> ${s.penalty}
      </div>
    </div>`).join('');
}

function mloReveal(i){
  const el=document.getElementById('msa'+i);
  el.style.display=el.style.display==='block'?'none':'block';
}

function mloBuildQuiz(){
  document.getElementById('mloQuizList').innerHTML=MLO_QUIZ.map((q,i)=>`
    <div class="mlo-qblock">
      <div class="mlo-qtext">${i+1}. ${q.q}</div>
      ${q.choices.map((c,j)=>`<button class="mlo-choice" id="mc${i}_${j}" onclick="mloAnswer(${i},${j})">${c}</button>`).join('')}
      <div class="mlo-explain" id="mex${i}">${q.ex}</div>
    </div>`).join('');
}

function mloAnswer(qi,ci){
  if(mloAnswered.includes(qi))return;
  mloAnswered.push(qi);
  const q=MLO_QUIZ[qi];
  document.getElementById('mc'+qi+'_'+ci).classList.add(ci===q.a?'correct':'wrong');
  if(ci!==q.a)document.getElementById('mc'+qi+'_'+q.a).classList.add('correct');
  document.getElementById('mex'+qi).style.display='block';
  if(ci===q.a){mloScore++;document.getElementById('mloScore').textContent=mloScore;}
  document.querySelectorAll('[id^="mc'+qi+'_"]').forEach(b=>b.disabled=true);
}

function mloResetQuiz(){
  mloScore=0;mloAnswered=[];
  document.getElementById('mloScore').textContent=0;
  mloBuildQuiz();
}

mloShowCard();
mloBuilScenarios();
mloBuildQuiz();
})();
</script>
