<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSM Mortgage Rescue Pack Library</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070b10;--panel:#0e151c;--panel-border:#1c2a35;
    --cyan:#00e5ff;--gold:#ffc857;--amber:#ff9f43;--red:#ff5470;--green:#3ddc97;
    --text:#cfe8ee;--dim:#5d7a87;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(circle at top, #0c1620 0%, #060a0e 70%);
    color:var(--text);font-family:'Rajdhani',sans-serif;padding:24px;min-height:100vh;
  }
  .header{text-align:center;margin-bottom:28px;}
  .header h1{
    font-family:'Orbitron',sans-serif;font-size:24px;letter-spacing:3px;
    color:var(--cyan);text-shadow:0 0 16px rgba(0,229,255,.4);
  }
  .header p{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);margin-top:8px;}

  .tier{margin-bottom:30px;max-width:1200px;margin-left:auto;margin-right:auto;}
  .tier-label{
    font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;
    color:var(--gold);margin-bottom:12px;padding-bottom:6px;
    border-bottom:1px solid var(--panel-border);
  }
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:12px;
  }
  .card{
    position:relative;
    background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;
    padding:14px;cursor:pointer;transition:.2s;text-decoration:none;color:var(--text);
    display:flex;flex-direction:column;gap:6px;
  }
  .card:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,229,255,.2);transform:translateY(-2px);}
  .card.exec{border-color:rgba(255,200,87,.4);}
  .card.exec:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(255,200,87,.25);}
  .card .icon{font-size:26px;}
  .card .label{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:1px;color:var(--text);}
  .card .sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);}
  .badge{
    font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);
    border:1px solid rgba(255,200,87,.4);border-radius:4px;padding:1px 6px;
    align-self:flex-start;
  }

  /* ——— preview icon on each card ——— */
  .card .preview-btn{
    position:absolute;top:10px;right:10px;
    width:22px;height:22px;border-radius:50%;
    background:rgba(0,0,0,.35);border:1px solid var(--panel-border);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--dim);transition:.15s;
  }
  .card .preview-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08);}

  /* ——— doc viewer modal ——— */
  .doc-viewer-overlay{
    position:fixed;inset:0;background:rgba(2,6,10,.78);
    display:none;align-items:center;justify-content:center;z-index:999;padding:24px;
  }
  .doc-viewer-overlay.open{display:flex;}
  .doc-viewer{
    background:var(--panel);border:1px solid var(--panel-border);border-radius:10px;
    max-width:680px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,.5);
  }
  .doc-viewer-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--panel-border);}
  .doc-viewer-head .title{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--text);}
  .doc-viewer-head .close-top{
    font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--red);
    border:1px solid rgba(255,84,112,.4);border-radius:4px;padding:4px 10px;cursor:pointer;background:rgba(255,84,112,.06);
  }
  .doc-viewer-head .close-top:hover{background:rgba(255,84,112,.15);}

  .doc-viewer-body{padding:18px 20px;overflow-y:auto;}

  .field-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:10px;margin-bottom:16px;}
  .field-cell{background:rgba(255,255,255,.02);border:1px solid var(--panel-border);border-radius:6px;padding:8px 10px;}
  .field-cell .f-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:4px;}
  .field-cell .f-value{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text);word-break:break-word;}

  .content-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
  .content-box{
    background:rgba(0,0,0,.25);border:1px solid var(--panel-border);border-radius:6px;padding:12px 14px;
    font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.6;color:var(--text);
    white-space:pre-wrap;max-height:240px;overflow-y:auto;
  }
  .doc-viewer-empty{color:var(--dim);text-align:center;padding:30px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;}

  .doc-viewer-actions{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--panel-border);}
  .doc-viewer-actions .primary-action{
    flex:1;background:rgba(255,200,87,.1);border:1px solid var(--gold);color:var(--gold);
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:6px;
    padding:10px;cursor:pointer;text-align:center;transition:.15s;
  }
  .doc-viewer-actions .primary-action:hover{background:rgba(255,200,87,.2);}
  .doc-viewer-actions .close-bottom{
    background:rgba(255,255,255,.03);border:1px solid var(--panel-border);color:var(--dim);
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:6px;
    padding:10px 16px;cursor:pointer;
  }
  .doc-viewer-actions .close-bottom:hover{color:var(--text);border-color:var(--cyan);}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ MORTGAGE RESCUE PACK LIBRARY</h1>
  <p>24 packs · click any card to run analysis</p>
</div>

<div id="tiers"></div>

<!-- ——— doc viewer modal ——— -->
<div class="doc-viewer-overlay" id="docViewerOverlay">
  <div class="doc-viewer">
    <div class="doc-viewer-head">
      <span class="title" id="docViewerTitle">DOCUMENT PREVIEW</span>
      <span class="close-top" id="docViewerCloseTop">× CLOSE</span>
    </div>
    <div class="doc-viewer-body">
      <div class="field-grid" id="docViewerFields"></div>
      <div class="content-label">DOCUMENT CONTENT</div>
      <div class="content-box" id="docViewerBody"></div>
    </div>
    <div class="doc-viewer-actions">
      <div class="primary-action" id="docViewerLaunch">⚡ RUN THIS PACK</div>
      <div class="close-bottom" id="docViewerCloseBottom">× CLOSE</div>
    </div>
  </div>
</div>

<script src="pack-configs.js"></script>
<script>
const TIERS = [
  { label: 'TIER 2 — MORTGAGE OPERATIONS RESCUE PACKS', keys: ['loan-denial','credit-event','employment-change','asset-sourcing','income-stability','fraud-investigation'] },
  { label: 'TIER 3 — PRODUCT-SPECIFIC RESCUE PACKS', keys: ['fha-rescue','va-rescue','usda-rescue','jumbo-rescue','dscr-investor','condo-rescue','new-construction'] },
  { label: 'TIER 4 — COMPLIANCE RESCUE PACKS', keys: ['trid-rescue','respa-rescue','hmda-audit'] },
  { label: 'TIER 6 — REAL ESTATE TRANSACTION PACKS', keys: ['hoa-risk','seller-risk','contract-risk'] },
  { label: 'TIER 7 — CLOSING & SECONDARY MARKET PACKS', keys: ['ctc-fast-track','postclose-audit'] },
  { label: 'TIER 8 — EXECUTIVE AI PACKS', keys: ['deal-killer','transaction-autopsy','closing-probability','mortgage-ops-scorecard'] },
];

const container = document.getElementById('tiers');

// ——— ACTIVE DOC RELAY ———

const RELAY_KEYS = [
  'TSM_RE_WAR_RELAY',
  'TSM_CONSTRUCTION_WAR_RELAY',
  'TSM_INS_WAR_RELAY'
];

function getRelayData(){

  // Check all relay storage keys first
  for(const k of RELAY_KEYS){

    try{

      const raw = sessionStorage.getItem(k);

      if(raw){

        try{
          return JSON.parse(raw);
        }catch(e){
          // Handle plain text values
          return { docText: raw };
        }

      }

    }catch(e){}

  }

  // Fall back to opener document
  try{

    if(window.opener && window.opener.document){

      const dp = window.opener.document.getElementById('docPaste');

      if(dp && dp.value){
        return { docText: dp.value };
      }

    }

  }catch(e){}

  return null;

}

// ——— DOC VIEWER ———
const docViewerOverlay = document.getElementById('docViewerOverlay');
const docViewerTitle = document.getElementById('docViewerTitle');
const docViewerFields = document.getElementById('docViewerFields');
const docViewerBody = document.getElementById('docViewerBody');
const docViewerLaunch = document.getElementById('docViewerLaunch');
let pendingPackKey = null;

function renderFieldGrid(relay){
  const skip = ['docText','analysis'];
  const entries = Object.entries(relay).filter(([k,v]) => !skip.includes(k) && v !== undefined && v !== null && v !== '');
  docViewerFields.innerHTML = entries.slice(0,8).map(([k,v]) => `
    <div class="field-cell">
      <div class="f-label">${k}</div>
      <div class="f-value">${v}</div>
    </div>`).join('');
}

function openDocViewer(packKey){
  pendingPackKey = packKey;
  const cfg = TSM_PACK_CONFIGS[packKey];
  const relay = getRelayData();

  if(relay){
    const label = relay.fileName || relay.docType || (relay.docText ? 'Document text from active session' : 'Active file');
    docViewerTitle.textContent = label;
    renderFieldGrid(relay);
    docViewerBody.textContent = relay.docText || relay.analysis || JSON.stringify(relay, null, 2);
  } else {
    docViewerTitle.textContent = 'NO RELAY DATA';
    docViewerFields.innerHTML = '';
    docViewerBody.innerHTML = '<div class="doc-viewer-empty">⚠ No relay data found — pack will run on general inputs only</div>';
  }

  docViewerLaunch.textContent = '⚡ RUN ' + (cfg ? cfg.title.toUpperCase() : 'THIS PACK');
  docViewerOverlay.classList.add('open');
}

function closeDocViewer(){
  docViewerOverlay.classList.remove('open');
  pendingPackKey = null;
}

document.getElementById('docViewerCloseTop').addEventListener('click', closeDocViewer);
document.getElementById('docViewerCloseBottom').addEventListener('click', closeDocViewer);
docViewerOverlay.addEventListener('click', e => { if (e.target === docViewerOverlay) closeDocViewer(); });
docViewerLaunch.addEventListener('click', () => { if (pendingPackKey) window.location.href = 'pack-engine.html?pack=' + pendingPackKey; });

// ——— CARD GRID ———
TIERS.forEach(tier => {
  const tierDiv = document.createElement('div');
  tierDiv.className = 'tier';
  tierDiv.innerHTML = `<div class="tier-label">${tier.label}</div>`;
  const grid = document.createElement('div');
  grid.className = 'grid';

  tier.keys.forEach(key => {
    const cfg = TSM_PACK_CONFIGS[key];
    if(!cfg) return;
    const a = document.createElement('a');
    a.href = 'pack-engine.html?pack=' + key;
    a.className = 'card' + (cfg.isExecutive ? ' exec' : '');
    a.innerHTML = `
      <div class="icon">${cfg.icon}</div>
      <div class="label">${cfg.title}</div>
      <div class="sub">${cfg.subtitle}</div>
      ${cfg.isExecutive ? '<div class="badge">EXECUTIVE</div>' : ''}
      <span class="preview-btn" title="Preview active document">👁</span>
    `;
    a.querySelector('.preview-btn').addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      openDocViewer(key);
    });
    grid.appendChild(a);
  });

  tierDiv.appendChild(grid);
  container.appendChild(tierDiv);
});
</script>
</body>
</html>
