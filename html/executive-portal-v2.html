<!DOCTYPE html>
<html>
<head>
  <title>TSM Executive Portal v2</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f19;
      color: #e6e6e6;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: #151b2c;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2a3550;
      min-height: 160px;
    }

    .title {
      font-size: 14px;
      color: #9fb3ff;
      margin-bottom: 10px;
    }

    .row {
      font-size: 12px;
      margin: 4px 0;
      opacity: 0.9;
    }

    .risk-high { color: #ff4d4d; }
    .risk-mid { color: #ffcc00; }
    .risk-low { color: #00d084; }
  </style>
</head>

<body>

<div class="grid">

  <div class="card">
    <div class="title">Multi-Agent Intelligence</div>
    <div id="agents"></div>
  </div>

  <div class="card">
    <div class="title">BNCA Risk Summary</div>
    <div id="bnca"></div>
  </div>

  <div class="card">
    <div class="title">Sector Activity</div>
    <div id="sectors"></div>
  </div>

  <div class="card">
    <div class="title">Mission Timeline (Replay)</div>
    <div id="timeline"></div>
  </div>

  <div class="card">
    <div class="title">Executive Summary</div>
    <div id="summary"></div>
  </div>

  <div class="card">
    <div class="title">System Health</div>
    <div id="health"></div>
  </div>

</div>

<script>
// =========================
// SAFE DATA ACCESS LAYER
// =========================

const Ledger = () =>
  window.TSMReportLedger?.getLatest?.(200) || [];

const Store = () =>
  window.TSMMissionStore?.getAll?.() || [];

const Replay = () =>
  window.TSMReplayEngine?.getLog?.() || [];


// =========================
// AGENTS VIEW
// =========================

function renderAgents() {
  const reports = Ledger();
  const map = {};

  reports.forEach(r => {
    if (!map[r.agent]) {
      map[r.agent] = { count: 0, risk: 0 };
    }
    map[r.agent].count++;
    map[r.agent].risk += (r.risk || 0);
  });

  document.getElementById("agents").innerHTML =
    Object.entries(map).map(([name, v]) => {
      const avg = v.risk / v.count;
      return `
        <div class="row">
          <b>${name}</b><br/>
          Reports: ${v.count}<br/>
          Avg Risk: ${avg.toFixed(1)}
        </div>
      `;
    }).join("");
}


// =========================
// BNCA VIEW
// =========================

function renderBNCA() {
  const missions = Store();

  let blocked = 0;
  let escalated = 0;
  let approved = 0;

  missions.forEach(m => {
    const d = m.bnca?.decision;
    if (d === "BLOCK") blocked++;
    if (d === "ESCALATE") escalated++;
    if (d === "PASS") approved++;
  });

  document.getElementById("bnca").innerHTML = `
    <div class="row risk-high">Blocked: ${blocked}</div>
    <div class="row risk-mid">Escalated: ${escalated}</div>
    <div class="row risk-low">Approved: ${approved}</div>
  `;
}


// =========================
// SECTOR VIEW
// =========================

function renderSectors() {
  const missions = Store();
  const map = {};

  missions.forEach(m => {
    map[m.sector] = (map[m.sector] || 0) + 1;
  });

  document.getElementById("sectors").innerHTML =
    Object.entries(map)
      .sort((a,b) => b[1]-a[1])
      .map(([k,v]) => `<div class="row">${k}: ${v}</div>`)
      .join("");
}


// =========================
// TIMELINE VIEW
// =========================

function renderTimeline() {
  const events = Replay().slice(-12);

  document.getElementById("timeline").innerHTML =
    events.map(e => `
      <div class="row">
        ${e.type} → ${JSON.stringify(e.payload || {})}
      </div>
    `).join("");
}


// =========================
// SUMMARY VIEW
// =========================

function renderSummary() {
  const reports = Ledger().slice(-8);

  document.getElementById("summary").innerHTML =
    reports.map(r => `
      <div class="row">
        ${r.summary || "No summary"}
      </div>
    `).join("");
}


// =========================
// SYSTEM HEALTH
// =========================

function renderHealth() {
  const reports = Ledger();
  const missions = Store();

  const riskAvg =
    reports.reduce((a,b) => a + (b.risk || 0), 0) /
    (reports.length || 1);

  const backlog = missions.filter(m =>
    m.status !== "COMPLETE"
  ).length;

  document.getElementById("health").innerHTML = `
    <div class="row">Avg Risk: ${riskAvg.toFixed(1)}</div>
    <div class="row">Active Missions: ${backlog}</div>
    <div class="row">Event Volume: ${reports.length}</div>
  `;
}


// =========================
// RENDER LOOP
// =========================

function tick() {
  renderAgents();
  renderBNCA();
  renderSectors();
  renderTimeline();
  renderSummary();
  renderHealth();
}

setInterval(tick, 1000);
tick();

</script>

</body>
</html>
