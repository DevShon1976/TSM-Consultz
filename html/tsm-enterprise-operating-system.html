<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSM Workforce Intelligence & Operations Command Center</title>
    <style>
        :root {
            --bg-primary: #060b13;
            --bg-sidebar: #0b1325;
            --bg-surface: #111c35;
            --bg-card: #172649;
            --accent-blue: #0070f3;
            --accent-cyan: #00dfd8;
            --accent-green: #00df89;
            --accent-amber: #f5a623;
            --text-main: #f4f6fa;
            --text-muted: #8fa0b7;
            --border-color: #1e2f55;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* LEFT SIDEBAR: Operational Command Structure Layer */
        #sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(0,112,243,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--accent-cyan);
            margin-top: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .functional-tree {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
        }

        .command-section {
            margin-bottom: 15px;
            border-radius: 6px;
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(30, 47, 85, 0.3);
            overflow: hidden;
        }

        .section-trigger {
            width: 100%;
            padding: 10px 12px;
            background: rgba(17, 28, 53, 0.4);
            border: none;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 700;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .section-trigger span.num {
            color: var(--accent-blue);
            margin-right: 6px;
            font-family: monospace;
        }

        .app-links-list {
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(0,0,0,0.2);
        }

        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .app-item:hover {
            color: var(--text-main);
            background: rgba(0, 112, 243, 0.15);
        }

        .app-item.active {
            color: var(--text-main);
            background: var(--accent-blue);
            font-weight: 600;
        }

        .app-item .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-color);
        }

        .app-item.active .status-indicator, .app-item:hover .status-indicator {
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
        }

        /* RIGHT COMMAND CANVAS PANEL */
        #command-canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-primary);
            overflow: hidden;
        }

        /* Virtual Desktop Simulation Address Bar */
        .system-bar {
            background-color: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .virtual-address {
            flex: 1;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 14px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--accent-cyan);
        }

        .pilot-badge {
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid var(--accent-amber);
            color: var(--accent-amber);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Main Workspace View Container */
        .workspace-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        /* Hero Positioning Layer */
        .hero-banner {
            background: linear-gradient(135deg, var(--bg-surface) 0%, rgba(17,28,53,0.4) 100%);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 25px;
        }

        .hero-banner h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .hero-banner p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-items: 1.4;
            max-width: 900px;
            margin-bottom: 12px;
        }

        .trust-statement {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 223, 137, 0.08);
            border: 1px solid rgba(0, 223, 137, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent-green);
        }

        /* Grid Framework Layout components */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .dashboard-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .card-header-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .card-header-group h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Interactive Dynamic Report Panel components */
        .metrics-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-block {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .metric-block label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .metric-block span.val {
            font-size: 1.4rem;
            font-weight: 800;
            font-family: monospace;
            color: var(--accent-cyan);
        }

        .metric-block span.val.green { color: var(--accent-green); }
        .metric-block span.val.amber { color: var(--accent-amber); }

        .analysis-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .analysis-table th {
            text-align: left;
            color: var(--text-muted);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .analysis-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(30, 47, 85, 0.4);
        }

        .badge-status {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .badge-status.ready { background: rgba(0,223,137,0.1); color: var(--accent-green); }
        .badge-status.coaching { background: rgba(245,166,35,0.1); color: var(--accent-amber); }

        /* Pilot Integration / Scenario Controller Mode Area */
        .scenario-infobox {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-blue);
        }

        .scenario-infobox h4 {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .scenario-infobox p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .pipeline-flow {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .pipeline-step {
            background: rgba(6, 11, 19, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pipeline-step .step-title {
            font-weight: 600;
        }

        .pipeline-step .step-status {
            color: var(--accent-cyan);
            font-family: monospace;
            font-size: 0.7rem;
        }

        /* Action Buttons and CTA Panel */
        .cta-group-container {
            background: linear-gradient(90deg, rgba(17,28,53,0.6) 0%, rgba(23,38,73,0.6) 100%);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .cta-text h4 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cta-text p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .action-button-trigger {
            background-color: var(--accent-blue);
            color: var(--text-main);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            white-space: nowrap;
        }

        .action-button-trigger:hover {
            background-color: #0060d0;
            transform: translateY(-1px);
        }

        /* System Metrics Bar Footer */
        .system-footer-bar {
            height: 32px;
            background-color: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer-status-nodes {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-green);
        }
    </style>
</head>
<body>
    <div style="display: flex; width: 100vw; height: 100vh; overflow: hidden; background-color: var(--bg-primary);">
        
        <aside style="width: 320px; min-width: 320px; background-color: var(--bg-surface); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto;">
            <div style="padding: 24px; border-bottom: 1px solid var(--border-color);">
                <h1 style="font-size: 1.2rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; margin: 0;">TSM HUB</h1>
                <p style="font-size: 0.65rem; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1px; margin: 4px 0 0 0; font-weight: 700;">Workforce Intelligence OS</p>
            </div>
            <div id="command-tree-root" style="display: flex; flex-direction: column; gap: 4px; padding: 12px;">
                </div>
        </aside>

        <div id="command-canvas">
        <div class="system-bar">
            <div class="virtual-address" id="simulated-url">/html/suite-builder.html</div>
            <div class="pilot-badge">RANDSTAD PILOT MODE ACTIVE</div>
        </div>

        <div class="workspace-viewport" style="flex: 1; position: relative; width: 100%; height: calc(100vh - 120px); background-color: var(--bg-primary); padding: 0; overflow: hidden;">
            <iframe id="workspace-frame" src="/html/suite-builder.html" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background-color: var(--bg-primary); color-scheme: dark;"></iframe>
        </div>

        <div class="system-footer-bar">
            <div class="footer-status-nodes">
                <div><span class="pulse-dot"></span> <span id="active-functional-node-label">01. Executive Command Layer Active</span></div>
            </div>
            <div>TSM Ecosystem OS v4.1.0 • Railway Mesh Node</div>
        </div>
    </div>
    <script>
        // Matrix Configuration Framework mapping business functionalities directly to target paths matching APP_CTX
        const BUSINESS_FUNCTIONAL_ARCH = [
            {

                    { name: "Strategist Index", path: "/html/strategist-index.html" },
                    { name: "Suite Builder Matrix", path: "/html/suite-builder.html" },
                    { name: "Client Access Portal", path: "/html/client-access.html" },
                    { name: "WIA Workforce Engine", path: "/html/wia.html" },
                    { name: "WIP Global Dashboard", path: "/html/wip-dashboard.html" },
                    { name: "Doc1 Intelligence Search", path: "/html/doc1-search.html" }
                ]
            },
            {
                id: "02",
                name: "Workforce Intel & Readiness",

                apps: [
                    { name: "Workforce Intelligence Ops", path: "/html/bpo/tsm-bpo-competitive-playbook" },
                    { name: "Healthcare Academy Pro", path: "/html/healthcare/tsm_healthcare_academy.html" },
                    { name: "CRC Practice Lab", path: "/html/healthcare/crc-hc-practice.html" },
                    { name: "Claims Pro Simulation", path: "/html/tsm-insurance/insurance-claims-pro.html" },
                    { name: "Insurance CE Command", path: "/html/tsm-insurance/insurance-ce-command.html" },
                    { name: "CE Study Prep", path: "/html/tsm-insurance/ce-study-prep.html" },

            },
            {

                purpose: "Revenue Cycle Management, Denials, Prior Auth, and BPO operations.",
                apps: [
                    { name: "Healthcare WIP Panel", path: "/html/healthcare/healthcare-wip.html" },
                    { name: "Healthcare Academy", path: "/html/healthcare/hc-academy.html" },
                    { name: "CRCR Scenario Simulator", path: "/html/healthcare/crcr-scenarios.html" },
                    { name: "HC Operational Script", path: "/html/healthcare/healthcare-demo-script.html" }
                ]
            },
            {
                id: "04",
                name: "Insurance Operations Command",
                purpose: "Claims tracking, benefit setups, licensing pipelines, and CE compliance matrix logs.",
                apps: [
                    { name: "Insurance Portal Base", path: "/html/tsm-insurance/insurance-portal.html" },
                    { name: "Insurance Hub", path: "/html/tsm-insurance/ins-hub1.html" },
                    { name: "Enterprise Ins Presentation", path: "/html/tsm-insurance/ins-presentation.html" },
                    { name: "Insurance Demo Trail", path: "/html/tsm-insurance/tsm-ins-demo-trail.html" }
                ]
            },
            {
                id: "05",
                name: "Financial Operations Command",
                purpose: "Ledger validation, bookkeeping, AR/AP cross audits, and automated reporting.",
                apps: [
                    { name: "FinOps Enterprise Pitch", path: "/html/finops-suite/finops-presentation.html" },
                    { name: "TSM Financial Presentation", path: "/html/finops-suite/tsm-presentation.html" },
                    { name: "FinOps Scenario Matrix", path: "/html/finops-suite/finops-scenarios.html" },
                    { name: "Accounting Study Guide", path: "/html/finops-suite/study-guide.html" },
                    { name: "Accountant Validation Desk", path: "/html/finops-suite/staff-accountant-interview.html" }
                ]
            },
            {
                id: "06",
                name: "Legal Operations Command",
                purpose: "Document intelligence auditing, contract reviews, and automated compliance frameworks.",
                apps: [
                    // Added trailing .html extension to route to your static file structures safely
                    { name: "Legal Hub Center Base", path: "/html/legal.html" },
                    { name: "Legal Readiness Tracker", path: "/html/legal-readiness-track.html" },
                    { name: "Healthcare Legal Interface", path: "/html/hc-legal/index.html" },

                ]
            },
            {
                id: "07",
                name: "Construction Operations Command",
                purpose: "Project documentation flows, compliance audits, and administration tracks.",
                apps: [
                    { name: "Construction WIP Framework", path: "/html/construction-suite/construction-wip.html" },
                    { name: "Document Showcase Hub", path: "/html/construction-suite/document-showcase.html" },
                    { name: "Construction Pitch Module", path: "/html/construction-suite/construct-pitch.html" }
                ]
            },
            {

                name: "BPO Service Delivery Network",
                purpose: "Client workflow routing matrix, escalation logs, and QA service tracking panels.",
                apps: [
                    { name: "BPO Suite Hub", path: "/html/bpo/suite-hub.html" },
                    { name: "BPO Command Center", path: "/html/bpo/bpo-command-center.html" },
                    { name: "Internal Operations Panel 1", path: "/html/bpo/bpo-internal1.html" },
                    { name: "Personal BPO Manual", path: "/html/bpo/tsm-bpo-personal-manual.html" },
                    { name: "BPO Scenario Prep Demos", path: "/html/bpo/html/bpo-scenarios-demo" }
                ]
            },
            {
                id: "09",
                name: "AI Intelligence Layer",
                purpose: "Document parsing, workflow engineering automation, and predictive workforce talent analytics.",
                apps: [
                    { name: "Doc Analysis Workbench", path: "/html/finops-suite/doc-analysis-tab.html" },
                    { name: "WIA Core Engine Logic", path: "/html/wia.html" },
                    { name: "Enterprise Target Search", path: "/html/doc1-search.html" }
                ]
            },
            {
                id: "10",
                name: "Sales, Demos & Growth Track",
                purpose: "Enterprise configuration scenarios, presentations, and client proof of concept pipelines.",
                apps: [
                    { name: "HC Sales Demo Trail", path: "/html/healthcare/tsm-hc-demo-trail.html" },
                    { name: "Ins Sales Demo Trail", path: "/html/tsm-insurance/tsm-ins-demo-trail.html" },
                    { name: "FinOps Strategy Desk", path: "/html/finops-suite/finops-presentation.html" },
                    { name: "Construction Suite Pitch", path: "/html/construction-suite/construct-pitch.html" },
                    { name: "CRCR Study Mode", path: "/html/finops-suite/crcr-study-mode.html" }
                ]
            }
        ];

        /**
         * Dynamic Interface Hyper-Link Navigation Execution Core Handler Node Controller Router 
         * Re-routes interactive window targets directly into the active viewport frame layer context.
         */
        function routeWorkspaceApp(element, targetedFileString, parentSectionNameString) {
            if (!targetedFileString) return;

            const routeContainerBar = document.getElementById('simulated-url');
            const footerStatusLabel = document.getElementById('active-functional-node-label');
            const workspaceFrame = document.getElementById('workspace-frame');

            // The data attribute now contains the exact full path from your APP_CTX mapping matrix directly
            const unifiedPathLocationString = targetedFileString;

            // Trigger updates across virtual simulated URL paths indicator strings
            if (routeContainerBar) {
                routeContainerBar.textContent = unifiedPathLocationString;
            }

            if (footerStatusLabel) {
                footerStatusLabel.textContent = `${parentSectionNameString} Active Context -> ${unifiedPathLocationString}`;
            }

            // FORCE NEW CONTENT RESOURCE LOAD INSIDE VIEWPORT CONTAINER FRAME
            if (workspaceFrame) {
                workspaceFrame.src = window.location.origin + unifiedPathLocationString;
            }

            // Sync visual active selection node styling states tracking indicators cleanly across sidebar matrices trees
            document.querySelectorAll('.app-item').forEach(item => {
                item.classList.toggle('active', item === element);
            });

            console.log(`[TSM OS Navigation Engine] Routing target canvas loaded context: ${unifiedPathLocationString}`);
        }

        /**
         * Interactive Core Business Functional Tree Structure Accordion Sidebar Document Factory Hydrater Component
         */
        function initializeFunctionalCommandTreeLayoutEngine() {
            const rootTreeElementContainerNode = document.getElementById('command-tree-root');
            if (!rootTreeElementContainerNode) return;

            let structuralTreeHTMLBufferMarkupString = '';

            BUSINESS_FUNCTIONAL_ARCH.forEach(section => {
                structuralTreeHTMLBufferMarkupString += `
                    <div class="command-section" style="margin-bottom: 6px;">
                        <button class="section-trigger" onclick="toggleSectionDropdownRow(this)" style="width: 100%; display: flex; justify-content: space-between; align-items: center; background: none; border: none; padding: 10px 12px; color: #a0aec0; cursor: pointer; text-align: left; font-family: inherit; font-size: 0.85rem; font-weight: 600;">
                            <div><span class="num" style="color: var(--accent-cyan); margin-right: 8px; font-family: monospace;">${section.id}.</span>${section.name}</div>
                            <span style="font-size:0.55rem; color:var(--text-muted);">▼</span>
                        </button>
                        <div class="app-links-list" style="display: none; flex-direction: column; gap: 2px; padding-left: 20px;">
                `;

                section.apps.forEach(app => {
                    structuralTreeHTMLBufferMarkupString += `
                        <div class="app-item" 
                             data-file="${app.path}"
                             onclick="routeWorkspaceApp(this, '${app.path}', '${section.id}. ${section.name}')"
                             style="padding: 8px 12px; color: #cbd5e1; font-size: 0.8rem; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                            <span>${app.name}</span>
                            <div class="status-indicator"></div>
                        </div>
                    `;
                });

                structuralTreeHTMLBufferMarkupString += `
                        </div>
                    </div>
                `;
            });

            rootTreeElementContainerNode.innerHTML = structuralTreeHTMLBufferMarkupString;
            console.log("[TSM Operational Command Framework Hydrator Matrix] Sidebar interface rows cleanly mapped to business functionality specifications trees.");
        }

        /**
         * Visual Helper Subsystem: Basic Toggle Mechanics for Accordion Layout Trees Panel Views
         */
        function toggleSectionDropdownRow(triggerButtonElement) {
            const linksContainerNodeElement = triggerButtonElement.nextElementSibling;
            if (!linksContainerNodeElement) return;

            const isCollapsed = linksContainerNodeElement.style.display === 'none' || linksContainerNodeElement.style.display === '';
            linksContainerNodeElement.style.display = isCollapsed ? 'flex' : 'none';
            triggerButtonElement.querySelector('span:last-child').textContent = isCollapsed ? '▲' : '▼';
        }

        // Mount initialization logic tasks triggers directly onto document lifecycle completion pipelines hooks framework
        document.addEventListener('DOMContentLoaded', () => {
            console.log("⚡ TSM Enterprise Operating System Base: Mounting infrastructure architecture frameworks...");
            
            // Build elements trees dynamically inside left sidebar wrapper
            initializeFunctionalCommandTreeLayoutEngine();

            // Bootstrap initial default active highlighted selection parameters right out out of dataset 
            const defaultStartingAppNodeReference = document.querySelector('.app-item');
            if (defaultStartingAppNodeReference) {
                defaultStartingAppNodeReference.classList.add('active');
            }
        });
    </script>
</body>
</html>
