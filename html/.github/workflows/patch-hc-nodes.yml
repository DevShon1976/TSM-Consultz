name: Patch HC Nodes — Mission Scripts + Anomaly Bridge

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Patch all 11 HC nodes
        run: |
          python3 << 'PYEOF'
          import re, os

          MISSION_SCRIPTS = '''<script src="/healthcare/js/tsm-mission-system.js"></script>
          <script src="/healthcare/js/tsm-mission-objectives.js"></script>'''

          BRIDGE_BLOCK = '''<!-- ── DOC ANOMALY BRIDGE ─────────────────────────────── -->
          <script>
          (function initAnomalyBridge() {
            const raw = localStorage.getItem('tsm-doc-anomaly');
            if (!raw) return;
            let p; try { p = JSON.parse(raw); } catch(e) { return; }
            const nodeId = (location.pathname.match(/hc-([a-z]+)/) || [])[1] || '';
            if (p.targetNodeIds && p.targetNodeIds.length &&
                !p.targetNodeIds.includes(nodeId) && !p.targetNodeIds.includes('hc-'+nodeId)) return;
            const banner = document.createElement('div');
            banner.id = 'tsm-anomaly-bridge-banner';
            banner.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:16px 20px;margin:12px 16px 0;font-family:var(--mono,monospace);font-size:.72rem;';
            const steps = Array.isArray(p.steps) ? p.steps.map((s,i)=>`${i+1}. ${s}`).join('<br>') : '—';
            const appLabel = p.nodeId ? 'HC '+p.nodeId.charAt(0).toUpperCase()+p.nodeId.slice(1)+' Node' : 'This Node';
            banner.innerHTML = `
              <div>
                <div style="color:#ef4444;font-weight:700;margin-bottom:6px">⚠ WHAT'S WRONG</div>
                <div style="color:var(--text,#e2e8f0);line-height:1.6">${p.narrative||'—'}</div>
                ${p.ref?`<div style="margin-top:6px;color:var(--muted,#94a3b8)">Ref: ${p.ref} · ${p.client||''}</div>`:''}
              </div>
              <div>
                <div style="color:#f59e0b;font-weight:700;margin-bottom:6px">🔧 BEST APP TO CURE IT</div>
                <div style="color:var(--text,#e2e8f0)">${appLabel}</div>
                <div style="margin-top:4px;color:var(--muted,#94a3b8)">Status: ${p.checkStatus||'FLAGGED'}</div>
                ${p.financialImpact?`<div style="margin-top:4px;color:#ef4444">Exposure: $${Number(p.financialImpact).toLocaleString()}</div>`:''}
              </div>
              <div>
                <div style="color:#4ade80;font-weight:700;margin-bottom:6px">📋 GUIDED REMEDIATION</div>
                <div style="color:var(--text,#e2e8f0);line-height:1.8">${steps}</div>
              </div>`;
            const anchor = document.querySelector('.main,#main,.content,main,.topbar+*');
            if (anchor) anchor.insertAdjacentElement('afterbegin', banner);
            else document.body.insertAdjacentElement('afterbegin', banner);
          })();
          </script>'''

          NODES = [
            'hc-billing',
            'hc-compliance',
            'hc-financial',
            'hc-grants',
            'hc-insurance',
            'hc-legal',
            'hc-medical',
            'hc-operations',
            'hc-pharmacy',
            'hc-taxprep',
            'hc-vendors',
          ]

          CONTROLLER_TAG = '<script src="/healthcare/js/hc-node-universal-controller.js?v=hc-universal-fix" defer></script>'

          patched = []
          skipped = []

          for node in NODES:
            path = f'html/{node}/index.html'
            if not os.path.exists(path):
              print(f'SKIP {node} — file not found at {path}')
              skipped.append(node)
              continue

            with open(path, 'r', encoding='utf-8') as f:
              content = f.read()

            changed = False

            # 1. Add mission scripts after controller tag if not already present
            if 'tsm-mission-system.js' not in content:
              if CONTROLLER_TAG in content:
                content = content.replace(
                  CONTROLLER_TAG,
                  CONTROLLER_TAG + '\n' + MISSION_SCRIPTS
                )
                changed = True
                print(f'  {node}: mission scripts added')
              else:
                print(f'  {node}: WARNING — controller tag not found, mission scripts not added')
            else:
              print(f'  {node}: mission scripts already present')

            # 2. Add anomaly bridge before </body> if not already present
            if 'initAnomalyBridge' not in content:
              # Handle all closing tag variants
              for closing in ['</body></html>', '</body>\n</html>', '</body>']:
                if closing in content:
                  content = content.replace(
                    closing,
                    BRIDGE_BLOCK + '\n' + closing,
                    1  # replace only first occurrence
                  )
                  changed = True
                  print(f'  {node}: anomaly bridge added')
                  break
              else:
                # No closing tag found — append to end
                content = content + '\n' + BRIDGE_BLOCK
                changed = True
                print(f'  {node}: anomaly bridge appended (no closing tag found)')
            else:
              print(f'  {node}: anomaly bridge already present')

            if changed:
              with open(path, 'w', encoding='utf-8') as f:
                f.write(content)
              patched.append(node)

          print(f'\nDone. Patched: {patched}')
          if skipped:
            print(f'Skipped: {skipped}')
          PYEOF

      - name: Commit patches
        run: |
          git config user.name "TSM Patcher"
          git config user.email "patch@tsm-shell"
          git add html/hc-*/index.html
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "feat: HC nodes — mission scripts + anomaly bridge all 11 nodes"
          git push