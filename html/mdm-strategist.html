<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSM MDM Strategist</title>
<style>
:root{--bg:#0a0f0a;--bg2:#0d140d;--bg3:#101810;--border:rgba(0,255,120,.1);
--green:#00ff78;--green-dim:rgba(0,255,120,.5);--gold:#ffd700;--red:#ff3b3b;
--amber:#ff9500;--text:#c8e8d0;--text-dim:#4a6a50;--card:#0d160d;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;min-height:100vh}
.nav{display:flex;align-items:center;background:#060d06;border-bottom:1px solid var(--border);height:38px;padding:0 16px}
.nav-brand{color:var(--green);font-weight:700;font-size:11px;letter-spacing:2px;margin-right:24px}
.nav-back{color:var(--text-dim);font-size:9px;text-decoration:none;letter-spacing:1px}
.nav-back:hover{color:var(--text)}
.nav-right{margin-left:auto;display:flex;gap:16px;color:var(--text-dim);font-size:10px}

.chain-bar{display:flex;align-items:center;gap:0;padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg2)}
.chain-step{display:flex;align-items:center;gap:8px;padding:5px 12px;font-size:8px;letter-spacing:1.5px;color:var(--text-dim);border:1px solid var(--border)}
.chain-step.done{color:var(--green);border-color:rgba(0,255,120,.3);background:rgba(0,255,120,.04)}
.chain-step.active{color:var(--gold);border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.05)}
.chain-arrow{color:var(--text-dim);padding:0 6px;font-size:10px}

.main{padding:18px 22px;max-width:1180px;margin:0 auto}
.hero{margin-bottom:16px}
.hero-title{font-size:13px;letter-spacing:1px}
.hero-sub{color:var(--text-dim);font-size:10px;margin-top:2px}

.empty{background:var(--card);border:1px solid var(--border);padding:40px;text-align:center;color:var(--text-dim)}
.empty a{color:var(--gold)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:var(--card);border:1px solid var(--border);padding:12px 10px}
.kpi-label{font-size:8px;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase}
.kpi-value{font-size:18px;font-weight:700;color:var(--green)}
.kpi-value.warn{color:var(--amber)} .kpi-value.gold{color:var(--gold)}

.section{background:var(--card);border:1px solid var(--border);margin-bottom:16px}
.section-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:1.5px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center}
.section-body{padding:14px}
.badge{font-size:8px;padding:2px 7px;border:1px solid;letter-spacing:1px}
.badge-amber{color:var(--amber);border-color:var(--amber)}
.badge-green{color:var(--green);border-color:var(--green)}

.case{background:var(--bg3);border:1px solid var(--border);margin-bottom:10px;padding:12px}
.case-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.case-score{color:var(--amber);font-weight:700;font-size:13px}
.case-reason{color:var(--text-dim);font-size:9px}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.rec-col{background:var(--bg2);border:1px solid var(--border);padding:10px;font-size:10px;line-height:1.7}
.rec-col .rid{color:var(--gold);font-weight:700;margin-bottom:4px}
.field-row{display:flex;justify-content:space-between;gap:6px}
.field-row.diff .fv{color:var(--red)}
.field-name{color:var(--text-dim)}
.reasoning{background:var(--bg2);border:1px solid var(--border);padding:8px 10px;font-size:9px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.btn{border:1px solid;font-family:inherit;font-size:9px;letter-spacing:1.5px;cursor:pointer;padding:7px 12px;transition:.2s}
.btn-green{background:var(--green);border-color:var(--green);color:#000;font-weight:700}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-dim)}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.btn-row{display:flex;gap:6px}
.btn:disabled{opacity:.35;cursor:not-allowed}

.hc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);margin-bottom:6px;font-size:10px}
.hc-names{color:var(--text)}
.hc-meta{color:var(--green);font-weight:700;margin-left:8px;font-size:9px}

.history-row{display:flex;gap:10px;padding:6px 10px;border-bottom:1px solid var(--border);font-size:9px;color:var(--text-dim);flex-wrap:wrap}
.history-row .decision-approved{color:var(--green)} .history-row .decision-rejected{color:var(--red)}
.history-row .src{color:var(--gold)}
</style></head><body>
<div class="nav">
  <div class="nav-brand">TSM SHELL // MDM STRATEGIST</div>
  <a class="nav-back" href="/war-rooms/mdm/mdm-war-room.html">&larr; BACK TO WAR ROOM</a>
  <div class="nav-right"><span id="navStatus">LOADING RELAY&hellip;</span></div>
</div>
<div class="chain-bar">
  <div class="chain-step done">1 · INTAKE</div><span class="chain-arrow">&rarr;</span>
  <div class="chain-step done">2 · UNDERSTAND</div><span class="chain-arrow">&rarr;</span>
  <div class="chain-step active">3 · DECIDE (STRATEGIST)</div><span class="chain-arrow">&rarr;</span>
  <div class="chain-step">4 · EXECUTE</div><span class="chain-arrow">&rarr;</span>
  <div class="chain-step">5 · EXPLAIN</div><span class="chain-arrow">&rarr;</span>
  <div class="chain-step">6 · AUDIT</div>
</div>
<div class="main">
  <div class="hero">
    <div class="hero-title">MASTER DATA <b style="color:var(--green)">STRATEGIST</b></div>
    <div class="hero-sub">Judgment-tier review for duplicate matches the engine can't resolve on its own.</div>
  </div>
  <div id="content"><div class="empty">Loading relay from War Room&hellip;</div></div>
</div>

<script src="/js/core/tsm-auto-pipeline.js"></script>
<script src="/config/tsm-client-key.js"></script>
<script>
(function(){
  function authHeaders(){
    const key = window.TSM_CLIENT_KEY;
    if(!key) console.warn('[MDM Strategist] TSM_CLIENT_KEY is unset — merge calls will 401. See html/config/tsm-client-key.js');
    return { 'Content-Type':'application/json', 'x-api-key': key || '' };
  }

  let relay = null;

  function loadRelay(){
    relay = (window.TSMAutoPipeline && window.TSMAutoPipeline.readRelay)
      ? window.TSMAutoPipeline.readRelay('mdm')
      : null;
    if(!relay){
      // Fallback read in case auto-pipeline hasn't attached yet
      try{
        const raw = sessionStorage.getItem('TSM_MDM_WAR_RELAY') || localStorage.getItem('TSM_MDM_WAR_RELAY')
                 || sessionStorage.getItem('tsm_mdm_war_relay') || localStorage.getItem('tsm_mdm_war_relay');
        relay = raw ? JSON.parse(raw) : null;
      }catch(e){ relay = null; }
    }
    render();
  }

  function reasoningFor(m){
    if(m.matchReason==='identifier_exact'){
      return `Shared, format-valid identifier (${m.matchField}) — this is the strongest evidence of duplication the engine produces. Recommended action: approve.`;
    }
    const gap = 100 - m.matchScore;
    return `Fuzzy name/field similarity only (${m.matchScore}% weighted match, no shared identifier). ${gap}% of the weighted score is uncertainty — this needs a human read on whether these are really the same ${m.domain} record.`;
  }

  function diffRow(label, a, b, keyA, keyB){
    const av = a[keyA] ?? '—', bv = b[keyB] ?? '—';
    const diff = String(av) !== String(bv);
    return `<div class="field-row ${diff?'diff':''}"><span class="field-name">${label}</span><span class="fv">${av} ${diff?('&harr; '+bv):''}</span></div>`;
  }

  function caseCard(m, idx){
    const fields = ['name','address','taxId','email','sku','employeeId','assetTag','orgCode','ccCode','pcCode','accountNumber','category','department','region'];
    const rows = fields.filter(f=> (m.recordA[f]!==undefined) || (m.recordB[f]!==undefined))
      .map(f=>diffRow(f, m.recordA, m.recordB, f, f)).join('');
    return `
    <div class="case" data-idx="${idx}">
      <div class="case-hdr">
        <div><span class="case-score">${m.matchScore}%</span> <span class="case-reason">match &middot; ${m.domain} &middot; ${m.matchReason==='identifier_exact'?('shared '+m.matchField):'fuzzy name match'}</span></div>
        <span class="badge badge-amber">NEEDS JUDGMENT</span>
      </div>
      <div class="compare">
        <div class="rec-col"><div class="rid">${m.recordA.id}</div>${rows}</div>
        <div class="rec-col"><div class="rid">${m.recordB.id}</div></div>
      </div>
      <div class="reasoning">${reasoningFor(m)}</div>
      <div class="btn-row">
        <button class="btn btn-green" data-action="approve" data-survivor="${m.recordA.id}" data-merged="${m.recordB.id}" data-idx="${idx}">KEEP ${m.recordA.id}</button>
        <button class="btn btn-green" data-action="approve" data-survivor="${m.recordB.id}" data-merged="${m.recordA.id}" data-idx="${idx}">KEEP ${m.recordB.id}</button>
        <button class="btn btn-ghost" data-action="reject" data-survivor="${m.recordA.id}" data-merged="${m.recordB.id}" data-idx="${idx}">NOT A DUPLICATE — REJECT</button>
      </div>
    </div>`;
  }

  function hcRow(m, idx){
    return `<div class="hc-row" data-idx="${idx}">
      <span class="hc-names">${m.recordA.id} "${m.recordA.name}" &harr; ${m.recordB.id} "${m.recordB.name}" <span class="hc-meta">${m.matchScore}% · shared ${m.matchField}</span></span>
      <span class="btn-row">
        <button class="btn btn-green" style="padding:4px 9px;font-size:8px" data-action="approve" data-survivor="${m.recordA.id}" data-merged="${m.recordB.id}" data-idx="${idx}">ONE-CLICK APPROVE</button>
        <button class="btn btn-ghost" style="padding:4px 9px;font-size:8px" data-action="reject" data-survivor="${m.recordA.id}" data-merged="${m.recordB.id}" data-idx="${idx}">REJECT</button>
      </span>
    </div>`;
  }

  function render(){
    const content = document.getElementById('content');
    if(!relay || !relay.duplicates || !relay.duplicates.length){
      document.getElementById('navStatus').textContent = 'NO RELAY';
      content.innerHTML = `<div class="empty">No relay data found.<br><br>Go to the <a href="/war-rooms/mdm/mdm-war-room.html">MDM War Room</a> and click <b>RELAY TO STRATEGIST</b> after running analysis.</div>`;
      return;
    }
    const ambiguous = relay.ambiguous || relay.duplicates.filter(m=>!(m.matchReason==='identifier_exact'&&m.matchScore>=95));
    const highConfidence = relay.highConfidence || relay.duplicates.filter(m=>m.matchReason==='identifier_exact'&&m.matchScore>=95);
    document.getElementById('navStatus').textContent = `RELAY LOADED · ${ambiguous.length} NEED REVIEW · ${highConfidence.length} HIGH-CONFIDENCE`;

    const kpis = relay.kpis || {};
    content.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Data Quality</div><div class="kpi-value">${kpis.quality_score ?? '—'}%</div></div>
        <div class="kpi-card"><div class="kpi-label">Needs Judgment</div><div class="kpi-value warn">${ambiguous.length}</div></div>
        <div class="kpi-card"><div class="kpi-label">High Confidence</div><div class="kpi-value gold">${highConfidence.length}</div></div>
        <div class="kpi-card"><div class="kpi-label">Relayed</div><div class="kpi-value">${relay.timestamp?new Date(relay.timestamp).toLocaleTimeString():'—'}</div></div>
      </div>
      <div class="section">
        <div class="section-head"><span>AMBIGUOUS MATCHES &middot; SIDE-BY-SIDE REVIEW</span><span class="badge badge-amber">${ambiguous.length}</span></div>
        <div class="section-body" id="ambiguousBody">${ambiguous.length ? ambiguous.map(caseCard).join('') : '<div style="color:var(--text-dim);padding:16px;text-align:center">No ambiguous matches — nothing needs a judgment call right now.</div>'}</div>
      </div>
      <div class="section">
        <div class="section-head"><span>HIGH-CONFIDENCE MATCHES &middot; RECOMMENDED APPROVE</span><span class="badge badge-green">${highConfidence.length}</span></div>
        <div class="section-body" id="hcBody">${highConfidence.length ? highConfidence.map(hcRow).join('') : '<div style="color:var(--text-dim);padding:16px;text-align:center">None this batch.</div>'}</div>
      </div>
      <div class="section">
        <div class="section-head"><span>STRATEGIST DECISION LOG &middot; THIS SESSION</span></div>
        <div class="section-body" id="historyBody"><div style="color:var(--text-dim);padding:12px;text-align:center">No decisions yet this session.</div></div>
      </div>`;

    document.getElementById('ambiguousBody').addEventListener('click', e=>handleDecision(e, ambiguous));
    document.getElementById('hcBody').addEventListener('click', e=>handleDecision(e, highConfidence));
  }

  const sessionLog = [];
  function renderSessionLog(){
    const el = document.getElementById('historyBody');
    if(!el) return;
    if(!sessionLog.length){ el.innerHTML = '<div style="color:var(--text-dim);padding:12px;text-align:center">No decisions yet this session.</div>'; return; }
    el.innerHTML = sessionLog.slice().reverse().map(h=>`
      <div class="history-row">
        <span>${new Date(h.ts).toLocaleTimeString()}</span>
        <span class="decision-${h.decision.toLowerCase()}">${h.decision}</span>
        <span>${h.domain}: kept ${h.survivorId} over ${h.mergedId}</span>
        <span class="src">${h.matchScore}% · ${h.matchReason==='identifier_exact'?('shared '+h.matchField):'fuzzy'}</span>
        <span>&mdash; ${h.actor}</span>
      </div>`).join('');
  }

  async function handleDecision(e, pool){
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const { action, survivor, merged, idx } = btn.dataset;
    const m = pool[Number(idx)];
    if(!m) return;
    const actor = window.prompt('Strategist name for this decision:', 'R. Whitfield');
    if(actor===null) return;
    btn.closest('.case, .hc-row').style.opacity = '0.5';
    try{
      const res = await fetch('/api/mdm/merge', { method:'POST', headers: authHeaders(), body: JSON.stringify({
        domain: m.domain, survivorId: survivor, mergedId: merged, actor,
        decision: action==='reject' ? 'REJECTED' : 'APPROVED',
        matchScore: m.matchScore, matchReason: m.matchReason, matchField: m.matchField,
        source: 'strategist'
      })});
      const d = await res.json();
      if(!d.ok) throw new Error(d.error || 'Decision failed');
      sessionLog.push(d.entry);
      renderSessionLog();
      btn.closest('.case, .hc-row').remove();
    } catch(err){
      alert(`Decision failed: ${err.message}`);
      btn.closest('.case, .hc-row').style.opacity = '1';
    }
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', loadRelay);
  else loadRelay();
  window.addEventListener('storage', e=>{
    if(['TSM_MDM_WAR_RELAY','tsm_mdm_war_relay'].includes(e.key)) loadRelay();
  });
})();
</script>
</body></html>
