<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>tsm-hc-grants · TSM Platform</title>
  <style>
/* TSM_SCROLL_FIX_V2 */
html, body { height: 100%; overflow-y: auto; }
main, .main { padding-bottom: 80px !important; min-height: calc(100vh - 60px); }
.panel { max-height: none !important; overflow-y: visible; }
.panel.active { display: block; }
.scroll-box { max-height: 400px; overflow-y: auto; }
.bnca-output { min-height: 120px; max-height: none; white-space: pre-wrap; }
.footer { position: fixed; bottom: 0; left: 0; right: 0; height: 32px; z-index: 10; }
.ask-bar { position: fixed; bottom: 40px; right: 12px; z-index: 20; }


.panel {
  max-height: 60vh;
  overflow-y: auto;
}

    body{background:#050c14;color:#c2d8ec;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;flex-direction:column;gap:16px;}
    h1{color:#06b6d4;font-size:1.4rem;letter-spacing:.12em;}
    p{color:#607a94;font-size:.85rem;letter-spacing:.08em;}
    .dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
<script>
window.TSM_UI = {
    runAudit: async (sector, factor) => {
        const feed = document.querySelector('.intelligence-feed-output') || document.getElementById('intelligence-feed-output');
        if (feed) feed.innerHTML = '<span style="color: #00ffff;">[STRATEGIST] Internal Link: Processing...</span>';
        try {
            const res = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: `auditops "${sector}" --factor "${factor}" --logic strategist` })
            });
            const data = await res.json();
            if (feed) feed.innerText = `[STRATEGIST] ${data.output || "Analysis Complete."}`;
        } catch (e) {
            if (feed) feed.innerText = "[STRATEGIST] Local API Bridge Failed.";
        }
    }
};
// Wire the sector cards to the auto-fill search prompt logic
document.addEventListener('click', (e) => {
    const card = e.target.closest('.module-card');
    if (card) {
        const sector = card.dataset.sector || "Construction";
        const factor = card.querySelector('h3')?.innerText || "General Audit";
        TSM_UI.runAudit(sector, factor);
    }
});
console.log("TSM_UI: Direct Neural Link Established.");
</script>

<script>(function(){
document.addEventListener('click', function(e){

  const el = e.target.closest('[data-tsm-action]');
  if(!el) return;

  const action = el.getAttribute('data-tsm-action');
  const args = el.getAttribute('data-tsm-args');

  if(window.TSM && TSM.launcher && TSM.launcher.run){
    TSM.launcher.run(action, args);
  } else {
    console.warn('[TSM] launcher missing:', action, args);
  }

});
})();</script>
