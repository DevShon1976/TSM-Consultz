<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RealtyOps BPO · TSM Matter</title>
<style>
:root{--a:#00ffc6;--bg:#05090d;--p:#081522;--b:rgba(255,255,255,.09);--t:#e8f7ff;--m:#8aa6b7}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top right,rgba(0,255,198,.08),transparent 35%),var(--bg);color:var(--t);font-family:Inter,system-ui,Arial}a{color:var(--a)}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;background:#07131d;border-bottom:1px solid var(--b)}
.logo{color:var(--a);font-weight:900;letter-spacing:.18em}.sub{color:var(--m);font-size:11px;letter-spacing:.12em}
.top-actions{display:flex;gap:8px;align-items:center}select,.pill{background:#0b1722;color:#dff7ff;border:1px solid var(--b);border-radius:9px;padding:9px 12px;font-weight:800}
#nav{display:flex;gap:8px;padding:10px 20px;background:#07131d;border-bottom:1px solid var(--b);overflow:auto}.nb{background:#0b1722;color:#dff7ff;border:1px solid var(--b);border-radius:8px;padding:9px 12px;font-weight:800;white-space:nowrap}.nb.active,.nb:hover{color:var(--a);border-color:var(--a)}
#app{display:flex}aside{width:240px;background:#07131d;min-height:calc(100vh - 110px);border-right:1px solid var(--b);padding:12px}main{flex:1;padding:18px}.si{display:flex;justify-content:space-between;padding:10px;border-left:3px solid transparent;color:#bad3e4;cursor:pointer}.si.active{border-left-color:var(--a);background:rgba(255,255,255,.04)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.stat,.card{background:rgba(8,21,34,.94);border:1px solid var(--b);border-radius:14px;padding:18px}.stat small,.ey{color:var(--m);letter-spacing:.16em;font-size:11px;text-transform:uppercase}.stat strong{display:block;color:var(--a);font-size:34px;margin:8px 0}.stat span{color:#9fb8c8}.hero h1{font-size:42px;margin:8px 0;color:#fff}.hero p{color:#bad3e4;line-height:1.6}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
input,textarea{width:100%;background:#050b12;color:#dff7ff;border:1px solid var(--b);border-radius:10px;padding:12px;margin:8px 0;font-family:monospace}textarea{min-height:130px}
button.primary{background:var(--a);color:#001;border:0;border-radius:10px;padding:11px 14px;font-weight:900;cursor:pointer}.out,pre.box{white-space:pre-wrap;background:#050b12;border:1px solid rgba(0,255,198,.18);border-left:3px solid var(--a);padding:14px;border-radius:10px;margin-top:12px;line-height:1.5;color:#dff7ff}.out{display:none}
@media(max-width:900px){#app{display:block}aside{width:auto;min-height:auto}.kpis,.grid4,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body data-sector="RealtyOps BPO">
<header>
  <div><div class="logo">TSM OPS CLOUD</div><div class="sub">REALTYOPS BPO · TRANSACTIONS · DISCLOSURES · MLS · COMMISSIONS · ESCROW OPS</div></div>
  <div class="top-actions">
    <select><option>Ameris Construction</option><option>Desert Financial</option><option>HonorHealth</option></select>
    <a class="pill" href="/bpo/bpo-website.html">BPO Website</a>
    <a class="pill" href="/bpo/launch.html">Launch</a>
  </div>
</header>

<div id="nav">
  <button class="nb active" data-lane="DASHBOARD">⬛ DASHBOARD</button>
  <button class="nb" data-lane="FILE INTAKE">🏠 FILE INTAKE</button>
  <button class="nb" data-lane="DISCLOSURES">📄 DISCLOSURES</button>
  <button class="nb" data-lane="COMMISSION RECON">💰 COMMISSION RECON</button>
  <button class="nb" data-lane="MLS / BROKER QC">✅ MLS / BROKER QC</button>
  <button class="nb" data-lane="AI ANALYST">🤖 AI ANALYST</button>
</div>

<div id="app">
<aside id="side"></aside>
<main id="main"></main>
</div>

<script src="/bpo/js/bpo-ops-cloud.js?v=groq1"></script>
<script>
const LANES={
"DASHBOARD":["Active Files","Disclosure Gaps","Commission Recon","Close Risk"],
"FILE INTAKE":["Buyer File","Listing File","Escrow Docs","Broker Review"],
"DISCLOSURES":["SPDS","HOA Docs","Inspection Items","Missing Signatures"],
"COMMISSION RECON":["Split Review","Referral Fees","Broker Fees","Payout Timing"],
"MLS / BROKER QC":["MLS Compliance","Listing Risk","Close Readiness","Audit Trail"],
"AI ANALYST":["BNCA Engine","Risk Summary","Owner Lane","Executive Report"]
};

function renderSide(active){
  side.innerHTML=Object.keys(LANES).map((x,i)=>`<div class="si ${x===active?'active':''}" data-lane="${x}"><span>${x}</span><b>${i+1}</b></div>`).join('');
}

function render(lane='DASHBOARD'){
  renderSide(lane);
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.lane===lane));
  const items=LANES[lane];

  main.innerHTML=`
    <div class="kpis">
      <div class="stat"><small>LANE STATUS</small><strong>ACTIVE</strong><span>${lane}</span></div>
      <div class="stat"><small>SLA WATCH</small><strong>4</strong><span>needs review</span></div>
      <div class="stat"><small>QUEUE ITEMS</small><strong>18</strong><span>in operating lane</span></div>
      <div class="stat"><small>BNCA</small><strong>READY</strong><span>strategist relay</span></div>
    </div>

    <section class="card hero">
      <p class="ey">ACTIVE OPERATING LANE</p>
      <h1>${lane}</h1>
      <p>This lane manages intake, queue ownership, SLA risk, document processing, BNCA recommendations, and strategist escalation for RealtyOps BPO.</p>
    </section>

    <section class="grid4">
      ${items.map(x=>`<div class="card"><p class="ey">${lane}</p><h2 style="color:var(--a)">${x}</h2><p style="color:#8aa6b7;line-height:1.45">Queue status, owner lane, SLA risk, document evidence, and next-action readiness.</p></div>`).join('')}
    </section>

    <section class="grid2">
      <div class="card">
        <p class="ey">WORKFLOW INTAKE</p>
        <input placeholder="Client / matter / project / account">
        <textarea id="lane-context" placeholder="Paste notes, documents, issue summary, or operational context..."></textarea>
        <button class="primary" onclick="window.TSM_BPO.runLane('${lane}')">⚡ RUN ${lane} BNCA</button>
        <pre id="lane-output" class="out"></pre>
      </div>
      <div class="card">
        <p class="ey">STRATEGIST OUTPUT</p>
        <pre class="box">TOP ISSUE
${lane} requires operating review.

BEST NEXT ACTIONS
1. Assign accountable owner.
2. Clear blockers older than current SLA.
3. Document evidence.
4. Relay unresolved risk to Strategist.

CONFIDENCE
92%</pre>
      </div>
    </section>`;
}

document.addEventListener('click',e=>{
  const hit=e.target.closest('[data-lane]');
  if(hit) render(hit.dataset.lane);
});
render();
</script>
<script src="/shared/tsm-operational-mesh.js?v=mesh1"></script>
<script src="/shared/tsm-relay-bus.js?v=relay2"></script>
<script src="/shared/tsm-memory-engine.js?v=phase3"></script>
<script src="/shared/tsm-global-command.js?v=phase4"></script>
<script src="/shared/tsm-sector-intelligence.js?v=phase5si"></script>
<script src="/shared/tsm-autonomous-execution.js?v=phase5"></script>

<script>(function(){
document.addEventListener('click', function(e){

  const el = e.target.closest('[data-tsm-action]');
  if(!el) return;

  const action = el.getAttribute('data-tsm-action');
  const args = el.getAttribute('data-tsm-args');

  if(window.TSM && TSM.launcher && TSM.launcher.run){
    TSM.launcher.run(action, args);
  } else {
    console.warn('[TSM] launcher missing:', action, args);
  }

});
})();</script>
  <script src="/core/tsm-kernel.js"></script>
  <script src="/core/tsm-enforcer.js"></script>
</body>
</html>

<script>
// ===== TSM_AUTONOMY_STANDARDIZED =====
window.TSM_AUTONOMY_STANDARDIZED = true;
</script>

<script>
// ===== TSM WAR ROOM SCOPED RELAY FIX =====
window.tsmMission = window.tsmMission || {
  id: "BPO-" + Date.now().toString(36),
  vertical: "bpo",
  relayKey: "tsm_war_relay_bpo"
};

function tsmWriteRelay(payload){
  TSM_KERNEL.setRelay("bpo", JSON.stringify(payload));
}
</script>
