<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TSM Anomaly Banner v2</title>
<style>
body{background:#070e1a;color:#e2e8f0;font-family:'Courier New',monospace;padding:16px;margin:0}
.ctrl-btn{padding:7px 13px;border-radius:3px;font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;cursor:pointer;border:1px solid;margin:0 4px 4px 0}
.guide-field{width:100%;background:#0a0f0a;border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-family:'Courier New',monospace;font-size:.65rem;padding:5px 7px;border-radius:3px;box-sizing:border-box;margin-bottom:4px}
</style>
</head>
<body>
<div style="font-size:.58rem;color:#334155;letter-spacing:.1em;margin-bottom:10px">TSM · DOC ANOMALY BRIDGE v2 TEST</div>
<div style="margin-bottom:12px">
  <button class="ctrl-btn" style="color:#ff4d6d;border-color:#ff4d6d55;background:rgba(255,77,109,.1)" onclick="fire('DENIAL_RISK')">⚠ DENIAL_RISK</button>
  <button class="ctrl-btn" style="color:#ff4d6d;border-color:#ff4d6d55;background:rgba(255,77,109,.1)" onclick="fire('AUTH_BLOCK')">⚠ AUTH_BLOCK</button>
  <button class="ctrl-btn" style="color:#ff4d6d;border-color:#ff4d6d55;background:rgba(255,77,109,.1)" onclick="fire('COMPLIANCE_BLOCK')">⚠ COMPLIANCE</button>
  <button class="ctrl-btn" style="color:#ff4d6d;border-color:#ff4d6d55;background:rgba(255,77,109,.1)" onclick="fire('PAYMENT_BLOCK')">⚠ PAYMENT</button>
  <button class="ctrl-btn" style="color:#64748b;border-color:#33415566;background:rgba(100,116,139,.08)" onclick="clearAll()">✕ CLEAR</button>
  <span id="status" style="font-size:.6rem;color:#10b981;padding:5px 10px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:3px">Ready</span>
</div>

<div id="banner-zone"></div>

<div style="background:#0d1824;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:14px;margin-top:8px">
  <div style="color:#00e5ff;font-size:.7rem;letter-spacing:.12em;margin-bottom:10px;font-weight:700">HC BILLING NODE — CLIENT INTAKE (SIMULATED)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">PATIENT NAME</div><input id="intake-patient" class="guide-field" placeholder="e.g. Jane Smith"></div>
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">CLAIM #</div><input id="intake-claim" class="guide-field" placeholder="e.g. CLM-1042"></div>
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">PAYER</div><input id="intake-payer" class="guide-field" placeholder="e.g. Aetna"></div>
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">DENIAL CODE</div><input id="intake-denial" class="guide-field" placeholder="e.g. CO-50"></div>
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">CPT CODE</div><input id="intake-cpt" class="guide-field" placeholder="e.g. 99213"></div>
    <div><div style="font-size:.56rem;color:#334155;margin-bottom:2px;letter-spacing:.08em">AMOUNT AT RISK</div><input id="intake-amount" class="guide-field" placeholder="e.g. $8,200"></div>
  </div>
  <textarea id="intake-issue" class="guide-field" rows="2" placeholder="Issue / denial reason..." style="resize:none;width:100%;margin-bottom:6px"></textarea>
  <button onclick="applyIntake()" style="width:100%;padding:6px;background:#f59e0b;color:#000;font-family:'Courier New',monospace;font-size:.62rem;font-weight:700;border:none;border-radius:3px;cursor:pointer;letter-spacing:.08em">⚡ SET MISSION FROM CLIENT DATA</button>
  <div id="intake-applied" style="display:none;margin-top:6px;padding:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981;font-size:.62rem;text-align:center;border-radius:3px">✓ MISSION SET — AI engines now context-aware for this claim</div>
</div>

<script>
function applyIntake(){
  document.getElementById('intake-applied').style.display='block';
  document.getElementById('status').textContent='✓ Mission applied to AI engines';
}

const SCENARIOS={
  DENIAL_RISK:{checkStatus:'DENIAL_RISK',narrative:'Denial detected on CLM-HC-7731 from Aetna ($8,200 exposure). Code: CO-50. Immediate billing review required — do not resubmit without resolution.',findings:['❌ CO-50 — Medical necessity not established on CLM-HC-7731','❌ Source: Aetna  ·  Client: Jane Smith','❌ Routed from Document Search  ·  Node origin: hc-denial'],financialImpact:8200,fileName:'Denial_CLM-HC-7731_Aetna.pdf',documentType:'DENIAL',ref:'CLM-HC-7731',client:'Jane Smith',exclusionCode:'CO-50',vendor:'Aetna',nodeId:'billing',targetNodeIds:['billing'],source:'doc-search'},
  AUTH_BLOCK:{checkStatus:'AUTH_BLOCK',narrative:'Prior authorization issue on PA-3309. Procedures must NOT proceed — denial risk is 100% without resolved auth. Contact UnitedHealthcare prior auth line immediately.',findings:['❌ PA-PEND — Prior auth not on file for scheduled MRI Brain','❌ CO-197 denial risk on uncleared procedure','❌ Client: Marcus Webb  ·  Payer: UnitedHealthcare'],financialImpact:0,fileName:'Prior_Auth_MRI_Request.pdf',documentType:'PRIOR AUTH',ref:'PA-3309',client:'Marcus Webb',exclusionCode:'CO-197',vendor:'UnitedHealthcare',nodeId:'insurance',targetNodeIds:['insurance'],source:'doc-search'},
  COMPLIANCE_BLOCK:{checkStatus:'COMPLIANCE_BLOCK',narrative:'Compliance flag on EOB-07-24. HIPAA authorization expired and OIG exclusion flag detected. Billing must halt until all documentation gaps are resolved.',findings:['❌ HIPAA_AUTH_EXPIRED — Obtain updated consent before billing','❌ OIG_EXCLUSION_FLAG — Provider removed from active billing roster','❌ CMS CoP documentation incomplete'],financialImpact:44000,fileName:'EOB_BCBS_Denial_July.pdf',documentType:'REMITTANCE',ref:'EOB-07-24',client:'Multi-patient',exclusionCode:'HIPAA_AUTH_EXPIRED',vendor:'BCBS Arizona',nodeId:'compliance',targetNodeIds:['compliance'],source:'doc-search'},
  PAYMENT_BLOCK:{checkStatus:'PAYMENT_BLOCK',narrative:'Payment anomaly on 835-07-24 from BCBS ($44,800 exposure). ERA requires manual reconciliation — systematic underpayment pattern detected across 3 batch files.',findings:['❌ ERA_IMPORT_FAILURE — 3 batch files failed processing','❌ UNDERPAYMENT_PATTERN — $6,400 below contracted rate','❌ AR_AGING_BREACH — 90+ day bucket exceeds threshold'],financialImpact:44800,fileName:'835_Remittance_BCBS_July.txt',documentType:'REMITTANCE',ref:'835-07-24',client:'Multi-patient',exclusionCode:'ERA_IMPORT_FAILURE',vendor:'BCBS Arizona',nodeId:'financial',targetNodeIds:['financial'],source:'doc-search'},
};

function fire(type){
  document.getElementById('banner-zone').innerHTML='';
  document.getElementById('intake-applied').style.display='none';
  ['intake-patient','intake-claim','intake-payer','intake-denial','intake-cpt','intake-amount','intake-issue'].forEach(id=>{const el=document.getElementById(id);if(el){el.value='';el.style.borderColor='';}});
  const p={...SCENARIOS[type],ts:Date.now(),timestamp:new Date().toISOString()};
  try{localStorage.setItem('tsm-doc-anomaly',JSON.stringify(p));}catch(e){}
  window.TSM_NODE_ID=p.nodeId;
  if(window._tsmBannerRender){window._tsmBannerRender(p,p.nodeId);}
  document.getElementById('status').textContent='✓ '+type+' — '+new Date().toLocaleTimeString();
}
function clearAll(){
  document.getElementById('banner-zone').innerHTML='';
  document.getElementById('status').textContent='Cleared';
  try{localStorage.removeItem('tsm-doc-anomaly');}catch(e){}
}
</script>

<script>
// ════════════════════════════════════════════════════════════
// TSM DOC ANOMALY BRIDGE v2 — embedded for test
// ════════════════════════════════════════════════════════════
(function(){
'use strict';
function resolveNodeId(){return window.TSM_NODE_ID||(()=>{const m=window.location.pathname.match(/hc-([^\/]+)\//);return m?m[1]:null})();}
function sevMeta(cs){const C={label:'CRITICAL',color:'#ff4d6d',bg:'rgba(255,77,109,.1)',glow:'0 0 20px rgba(255,77,109,.4)'};const H={label:'HIGH',color:'#f59e0b',bg:'rgba(245,158,11,.09)',glow:'0 0 16px rgba(245,158,11,.3)'};return({DENIAL_RISK:C,AUTH_BLOCK:C,COMPLIANCE_BLOCK:C,PAYMENT_BLOCK:C,LEGAL_HOLD:H,DOCUMENTATION_BLOCK:H})[cs]||{label:'ACTIVE',color:'#00e5ff',bg:'rgba(0,229,255,.07)',glow:'0 0 12px rgba(0,229,255,.2)'};}
const BEST_APPS={DENIAL_RISK:[{url:'/html/healthcare/hc-billing/index.html',label:'HC Billing Node',engine:'Denial Root Cause',why:'Primary denial management + appeal drafting engine'},{url:'/html/healthcare/hc-denial-war-room.html',label:'HC Denial War Room',engine:'BNCA',why:'Cross-claim denial pattern + batch appeal'}],AUTH_BLOCK:[{url:'/html/healthcare/hc-insurance/index.html',label:'HC Insurance Node',engine:'Prior Auth Status',why:'Prior auth verification + payer escalation engine'},{url:'/html/healthcare/hc-billing/index.html',label:'HC Billing Node',engine:'AR Recovery',why:'Claim hold + auth-linked denial tracking'}],COMPLIANCE_BLOCK:[{url:'/html/healthcare/hc-compliance/index.html',label:'HC Compliance Node',engine:'BNCA',why:'HIPAA/OIG audit + documentation checklist'},{url:'/html/healthcare/hc-billing/index.html',label:'HC Billing Node',engine:'Denial Root Cause',why:'Compliance-linked claim hold resolution'}],PAYMENT_BLOCK:[{url:'/html/healthcare/hc-financial/index.html',label:'HC Financial Node',engine:'BNCA',why:'ERA reconciliation + underpayment appeal'},{url:'/html/healthcare/hc-billing/index.html',label:'HC Billing Node',engine:'AR Recovery',why:'Payer hold tracking + AR recovery'}],LEGAL_HOLD:[{url:'/html/healthcare/hc-legal/index.html',label:'HC Legal Node',engine:'BNCA',why:'Legal review queue + contract dispute engine'},{url:'/html/healthcare/hc-compliance/index.html',label:'HC Compliance Node',engine:'BNCA',why:'Regulatory exposure + OIG watchlist'}],DOCUMENTATION_BLOCK:[{url:'/html/healthcare/hc-medical/index.html',label:'HC Medical Node',engine:'BNCA',why:'Clinical doc gap + provider query engine'},{url:'/html/healthcare/hc-billing/index.html',label:'HC Billing Node',engine:'Denial Root Cause',why:'Documentation-linked denial hold'}]};

function buildSteps(cs,p){
  const ref=p.ref||'',payer=p.vendor||'',code=p.exclusionCode||'',client=p.client||'',amount=p.financialImpact?'$'+Number(p.financialImpact).toLocaleString():'',apps=BEST_APPS[cs]||BEST_APPS.DENIAL_RISK,primaryUrl=apps[0].url;
  const S={
    DENIAL_RISK:[
      {title:'Pull & review EOB / ERA',detail:'Confirm exact CARC/RARC denial reason codes from the remittance file.',fields:[{id:'f-claim',label:'Claim #',sourceKey:'ref',placeholder:'e.g. CLM-1042'},{id:'f-payer',label:'Payer',sourceKey:'vendor',placeholder:'e.g. Aetna'},{id:'f-code',label:'Denial Code',sourceKey:'exclusionCode',placeholder:'e.g. CO-50'},{id:'f-amount',label:'Amount at Risk',sourceKey:'financialImpact',placeholder:'e.g. $8,200',prefix:'$'}],action:{label:'Open HC Billing → Load Claim',type:'open-app',url:primaryUrl}},
      {title:'Verify CPT / ICD-10 pairing',detail:'Check modifier alignment and coding specificity against the denial code.',fields:[{id:'f-cpt',label:'CPT Code',sourceKey:'',placeholder:'e.g. 99213'},{id:'f-icd',label:'ICD-10',sourceKey:'',placeholder:'e.g. M54.5'},{id:'f-modifier',label:'Modifier',sourceKey:'',placeholder:'e.g. -25'},{id:'f-patient',label:'Patient Name',sourceKey:'client',placeholder:'e.g. Jane Smith'}]},
      {title:'Confirm appeal window',detail:'Timely filing deadline is typically 120–180 days from DOS. Verify payer-specific limit.',fields:[{id:'f-dos',label:'Date of Service',sourceKey:'',placeholder:'e.g. 2024-06-15'},{id:'f-deadline',label:'Appeal Deadline',sourceKey:'',placeholder:'e.g. 2024-10-13'},{id:'f-days',label:'Days Remaining',sourceKey:'',placeholder:'Calculate from above'}]},
      {title:'Draft & submit appeal letter',detail:'Include medical necessity documentation, CARC rebuttal, and supporting records.',fields:[{id:'f-appeal-ref',label:'Appeal Ref #',sourceKey:'',placeholder:'Payer-assigned'},{id:'f-appeal-notes',label:'Key Arguments',sourceKey:'',placeholder:'e.g. Service was medically necessary per…',textarea:true}],action:{label:'⚡ Run Denial Pack in HC Billing',type:'run-engine',url:primaryUrl,engine:'Denial Root Cause',contextKey:'denial'}},
      {title:'Log submission + set follow-up',detail:'Track in AR system. Set 10-day follow-up reminder.',fields:[{id:'f-submit-date',label:'Submitted Date',sourceKey:'',placeholder:"Today's date"},{id:'f-tracking',label:'Payer Tracking #',sourceKey:'',placeholder:'From payer portal'},{id:'f-followup',label:'Follow-up Date',sourceKey:'',placeholder:'+10 days'}],action:{label:'✓ Mark Complete & Escalate',type:'complete'}},
    ],
    AUTH_BLOCK:[
      {title:'Verify current prior auth status',detail:'Pull auth record from payer portal — confirm procedure codes are covered.',fields:[{id:'f-claim',label:'Claim / PA #',sourceKey:'ref',placeholder:'e.g. PA-3309'},{id:'f-payer',label:'Payer',sourceKey:'vendor',placeholder:'e.g. UnitedHealthcare'},{id:'f-cpt',label:'Procedure Code',sourceKey:'',placeholder:'e.g. 70553 (MRI Brain)'},{id:'f-patient',label:'Patient Name',sourceKey:'client',placeholder:'e.g. Marcus Webb'}],action:{label:'Open HC Insurance Node',type:'open-app',url:primaryUrl}},
      {title:'Contact payer prior auth line',detail:'Escalate if hold time exceeds 2 hours. Document call reference number.',fields:[{id:'f-phone',label:'Payer Auth Line',sourceKey:'',placeholder:'See payer directory'},{id:'f-ref',label:'Call Reference #',sourceKey:'',placeholder:'From payer rep'},{id:'f-rep',label:'Rep Name',sourceKey:'',placeholder:'Document for records'},{id:'f-eta',label:'Auth ETA',sourceKey:'',placeholder:'e.g. 24 hours'}]},
      {title:'Document auth number — do NOT bill until confirmed',detail:'Auth number must be in claim header before any submission.',fields:[{id:'f-auth-num',label:'Auth Number',sourceKey:'',placeholder:'Payer-assigned — required'},{id:'f-auth-from',label:'Auth Valid From',sourceKey:'',placeholder:'DOS must fall in range'},{id:'f-auth-exp',label:'Auth Expiry',sourceKey:'',placeholder:'Do not bill after this date'}]},
      {title:'Submit claim with auth on file',detail:'Include auth number in Box 23 (CMS-1500) or Loop 2300 REF segment (837P).',fields:[{id:'f-sub-date',label:'Submission Date',sourceKey:'',placeholder:"Today's date"},{id:'f-sub-method',label:'Submit Method',sourceKey:'',placeholder:'e.g. Clearinghouse / Portal'},{id:'f-final-claim',label:'Final Claim #',sourceKey:'ref',placeholder:'e.g. CLM-3309'}],action:{label:'⚡ Run Auth Status in HC Insurance',type:'run-engine',url:primaryUrl,engine:'Prior Auth Status',contextKey:'auth'}},
      {title:'Set 48-hour follow-up until resolved',detail:'If auth not received in 48hrs, escalate to payer relations director.',fields:[{id:'f-followup',label:'Next Follow-up',sourceKey:'',placeholder:'+48 hours from today'},{id:'f-escalate-to',label:'Escalate To',sourceKey:'',placeholder:'e.g. Payer Relations Dir.'}],action:{label:'✓ Mark Complete & Escalate',type:'complete'}},
    ],
    COMPLIANCE_BLOCK:[
      {title:'Halt billing — identify compliance flags',detail:'Do not release claim to billing queue until all flags are cleared.',fields:[{id:'f-claim',label:'Claim / Record #',sourceKey:'ref',placeholder:'e.g. EOB-07-24'},{id:'f-flags',label:'Compliance Flags',sourceKey:'exclusionCode',placeholder:'e.g. HIPAA_AUTH_EXPIRED'},{id:'f-patient',label:'Patient / Account',sourceKey:'client',placeholder:'e.g. Multi-patient'},{id:'f-amount',label:'Revenue at Risk',sourceKey:'financialImpact',placeholder:'e.g. $44,000',prefix:'$'}],action:{label:'Open HC Compliance Node',type:'open-app',url:primaryUrl}},
      {title:'Obtain updated HIPAA authorization',detail:'Expired or missing consent blocks billing. New auth required before release.',fields:[{id:'f-auth-status',label:'Current Auth Status',sourceKey:'',placeholder:'e.g. Expired / Missing'},{id:'f-auth-date',label:'Auth Obtained Date',sourceKey:'',placeholder:'Date new consent signed'},{id:'f-auth-by',label:'Obtained By',sourceKey:'',placeholder:'Staff name / role'}]},
      {title:'Verify OIG exclusion list for all providers',detail:'Check exclusions.oig.hhs.gov — billing for excluded provider = False Claims Act.',fields:[{id:'f-npi',label:'Provider NPI',sourceKey:'',placeholder:'10-digit NPI'},{id:'f-oig-date',label:'OIG Check Date',sourceKey:'',placeholder:"Today's date"},{id:'f-oig-result',label:'OIG Result',sourceKey:'',placeholder:'CLEAR / FLAG — document'}]},
      {title:'Complete documentation checklist & release',detail:'All flags must be cleared before claim releases to billing queue.',fields:[{id:'f-cleared',label:'Items Cleared',sourceKey:'',placeholder:'List flags resolved',textarea:true},{id:'f-release-date',label:'Release Date',sourceKey:'',placeholder:'Date cleared for billing'},{id:'f-cleared-by',label:'Cleared By',sourceKey:'',placeholder:'Compliance officer name'}],action:{label:'⚡ Run Compliance BNCA',type:'run-engine',url:primaryUrl,engine:'BNCA',contextKey:'compliance'}},
      {title:'File compliance resolution memo',detail:'Document resolution in compliance tracker. Update compliance score.',fields:[{id:'f-memo',label:'Memo Reference #',sourceKey:'',placeholder:'Internal tracking #'},{id:'f-score',label:'New Compliance Score',sourceKey:'',placeholder:'e.g. 91%'}],action:{label:'✓ Mark Complete & Escalate',type:'complete'}},
    ],
    PAYMENT_BLOCK:[
      {title:'Pull ERA / 835 — compare to contracted rate',detail:'Identify exact payment variance. Flag items >5% below contract.',fields:[{id:'f-era',label:'ERA / 835 Ref',sourceKey:'ref',placeholder:'e.g. 835-07-24'},{id:'f-payer',label:'Payer',sourceKey:'vendor',placeholder:'e.g. BCBS Arizona'},{id:'f-posted',label:'Posted Amount',sourceKey:'',placeholder:'e.g. $38,400'},{id:'f-contract',label:'Contracted Rate',sourceKey:'financialImpact',placeholder:'e.g. $44,800',prefix:'$'},{id:'f-variance',label:'Variance',sourceKey:'',placeholder:'Calc: contract − posted'}],action:{label:'Open HC Financial Node',type:'open-app',url:primaryUrl}},
      {title:'Flag underpayments — initiate appeal',detail:'Variance >5% should be appealed. Document payer reference.',fields:[{id:'f-under-amt',label:'Underpayment $',sourceKey:'',placeholder:'e.g. $6,400'},{id:'f-under-claims',label:'Affected Claims',sourceKey:'',placeholder:'e.g. 3 of 18 batch items'},{id:'f-appeal-by',label:'Appeal Deadline',sourceKey:'',placeholder:'Payer-specific — check contract'}]},
      {title:'Check for payer hold — contact payer relations',detail:'Active payer hold blocks all payments. Must be cleared at payer-relations level.',fields:[{id:'f-hold-status',label:'Hold Status',sourceKey:'',placeholder:'Active / Cleared'},{id:'f-hold-reason',label:'Hold Reason',sourceKey:'',placeholder:'From payer notice'},{id:'f-hold-contact',label:'Payer Contact',sourceKey:'',placeholder:'Payer relations rep name'},{id:'f-hold-eta',label:'Resolution ETA',sourceKey:'',placeholder:'From payer'}]},
      {title:'Post clean items — quarantine disputed amounts',detail:'Post undisputed payments now. Hold disputed amounts in suspense.',fields:[{id:'f-clean',label:'Clean Post Total',sourceKey:'',placeholder:'e.g. $38,400'},{id:'f-suspense',label:'Suspense Amount',sourceKey:'',placeholder:'e.g. $6,400'},{id:'f-suspense-ref',label:'Suspense Ref #',sourceKey:'',placeholder:'Internal tracking'}],action:{label:'⚡ Run AR Recovery in HC Financial',type:'run-engine',url:primaryUrl,engine:'BNCA',contextKey:'payment'}},
      {title:'Escalate unresolved ERA failures within 24 hours',detail:'If ERA errors persist, escalate to financial analyst and payer relations director.',fields:[{id:'f-escalate-to',label:'Escalate To',sourceKey:'',placeholder:'Financial Analyst name'},{id:'f-escalate-by',label:'Escalate By',sourceKey:'',placeholder:'+24 hours from today'}],action:{label:'✓ Mark Complete & Escalate',type:'complete'}},
    ],
  };
  return S[cs]||S.DENIAL_RISK;
}

function autoFill(field,payload){
  if(!field.sourceKey)return'';
  let v=payload[field.sourceKey];
  if(field.sourceKey==='financialImpact'&&v)v=Number(v).toLocaleString();
  return v||'';
}

function renderBanner(payload,nodeId){
  const cs=payload.checkStatus,sev=sevMeta(cs),c=sev.color,apps=BEST_APPS[cs]||BEST_APPS.DENIAL_RISK,steps=buildSteps(cs,payload),narr=(payload.narrative||'').replace(/<[^>]*>/g,''),findings=Array.isArray(payload.findings)?payload.findings:[];

  const appsHtml=apps.map((app,i)=>`
    <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:4px;background:${i===0?'rgba(0,0,0,.3)':'rgba(0,0,0,.15)'};border:1px solid ${i===0?c+'44':'rgba(255,255,255,.06)'};margin-bottom:6px">
      <div style="flex-shrink:0;width:18px;height:18px;border-radius:50%;background:${i===0?c:'rgba(255,255,255,.08)'};display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:900;color:${i===0?'#000':'#475569'}">${i===0?'★':i+1}</div>
      <div style="flex:1;min-width:0"><div style="color:${i===0?c:'#64748b'};font-size:.68rem;font-weight:700;margin-bottom:2px">${app.label}</div><div style="color:#334155;font-size:.6rem;line-height:1.4">${app.why}</div></div>
      <a href="${app.url}" target="_blank" onclick="TSM_ANB.openApp('${app.url}','${app.engine||''}','${app.label}')" style="flex-shrink:0;padding:4px 9px;border-radius:3px;background:${i===0?c:'transparent'};color:${i===0?'#000':c};border:1px solid ${c}${i===0?'':'55'};font-family:'Courier New',monospace;font-size:.58rem;font-weight:700;letter-spacing:.06em;text-decoration:none;white-space:nowrap">${i===0?'★ OPEN':'→ OPEN'}</a>
    </div>`).join('');

  const stepsHtml=steps.map((step,si)=>{
    const fieldsHtml=(step.fields||[]).map(f=>{
      const val=autoFill(f,payload);
      const af=val?` data-af="1"`:'';
      if(f.textarea)return`<div style="margin-bottom:5px"><div style="font-size:.56rem;color:#334155;letter-spacing:.07em;margin-bottom:2px">${f.label}${val?` <span style="color:${c};font-size:.52rem">AUTO-FILLED</span>`:''}</div><textarea id="${f.id}-${si}" rows="2" style="width:100%;background:#0a0f0a;border:1px solid ${val?c+'44':'rgba(255,255,255,.08)'};color:${val?'#e2e8f0':'#64748b'};font-family:'Courier New',monospace;font-size:.63rem;padding:5px 7px;border-radius:3px;resize:none;box-sizing:border-box;line-height:1.4" placeholder="${f.placeholder}"${af} oninput="TSM_ANB.save('${f.id}',this.value)">${val}</textarea></div>`;
      return`<div style="margin-bottom:5px"><div style="font-size:.56rem;color:#334155;letter-spacing:.07em;margin-bottom:2px">${f.label}${val?` <span style="color:${c};font-size:.52rem">AUTO-FILLED</span>`:''}</div><input id="${f.id}-${si}" type="text" value="${val}" style="width:100%;background:#0a0f0a;border:1px solid ${val?c+'44':'rgba(255,255,255,.08)'};color:${val?'#e2e8f0':'#64748b'};font-family:'Courier New',monospace;font-size:.63rem;padding:5px 7px;border-radius:3px;box-sizing:border-box" placeholder="${f.placeholder}"${af} oninput="TSM_ANB.save('${f.id}',this.value)"></div>`;
    }).join('');
    let aHtml='';
    if(step.action){const a=step.action;
      if(a.type==='open-app')aHtml=`<a href="${a.url}" target="_blank" onclick="TSM_ANB.openApp('${a.url}','','${a.label}')" style="display:block;text-align:center;padding:6px;border-radius:3px;background:${c};color:#000;font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-decoration:none;margin-top:8px">${a.label} ↗</a>`;
      else if(a.type==='run-engine')aHtml=`<button onclick="TSM_ANB.runEngine('${a.url}','${a.engine}','${a.contextKey||''}')" style="width:100%;padding:6px;border-radius:3px;background:${c};color:#000;font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;border:none;cursor:pointer;margin-top:8px">${a.label} ↗</button>`;
      else if(a.type==='complete')aHtml=`<button onclick="TSM_ANB.markAllComplete()" style="width:100%;padding:6px;border-radius:3px;background:rgba(16,185,129,.2);color:#10b981;font-family:'Courier New',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;border:1px solid rgba(16,185,129,.35);cursor:pointer;margin-top:8px">${a.label}</button>`;
    }
    return`<div class="tsm-anb-step" id="tsm-anb-step-${si}" style="border:1px solid rgba(255,255,255,.06);border-radius:4px;margin-bottom:7px;overflow:hidden;transition:border-color .2s">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 11px;background:rgba(0,0,0,.3);cursor:pointer;user-select:none" onclick="TSM_ANB.toggle(${si})">
        <input type="checkbox" id="tsm-chk-${si}" style="width:14px;height:14px;accent-color:${c};flex-shrink:0;cursor:pointer" onchange="TSM_ANB.check(${si},this.checked)" onclick="event.stopPropagation()">
        <div style="flex-shrink:0;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:${c}">${String(si+1).padStart(2,'0')}</div>
        <div style="flex:1;min-width:0">
          <div class="tsm-step-title" style="color:#e2e8f0;font-size:.68rem;font-weight:700;margin-bottom:1px">${step.title}</div>
          <div style="color:#334155;font-size:.58rem;line-height:1.3">${step.detail}</div>
        </div>
        <span id="chev-${si}" style="color:#1e293b;font-size:.65rem;transition:transform .2s">▼</span>
      </div>
      <div id="tsm-body-${si}" style="padding:11px;border-top:1px solid rgba(255,255,255,.05);display:${si===0?'block':'none'}">
        ${fieldsHtml}${aHtml}
      </div>
    </div>`;
  }).join('');

  const metaHtml=[payload.fileName?`<span>FILE <strong style="color:#94a3b8">${payload.fileName}</strong></span>`:'',payload.ref?`<span>REF <strong style="color:#94a3b8">${payload.ref}</strong></span>`:'',payload.vendor?`<span>PAYER <strong style="color:#94a3b8">${payload.vendor}</strong></span>`:'',payload.client?`<span>CLIENT <strong style="color:#94a3b8">${payload.client}</strong></span>`:'',payload.financialImpact?`<span>EXPOSURE <strong style="color:${c}">$${Number(payload.financialImpact).toLocaleString()}</strong></span>`:''].filter(Boolean).join(`<span style="color:#1e293b;margin:0 6px">·</span>`);

  document.getElementById('banner-zone').innerHTML=`
<div id="tsm-anb-root" style="margin:0 0 20px;border:1px solid ${c}44;border-radius:6px;background:${sev.bg};box-shadow:${sev.glow};font-family:'Courier New',monospace;overflow:hidden;animation:anb-in .4s ease">
<style>@keyframes anb-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}.tsm-anb-step.done .tsm-step-title{text-decoration:line-through;opacity:.35}.tsm-anb-step.done{border-color:rgba(16,185,129,.2)!important}[data-af="1"]{background:#050f05!important}</style>
<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(0,0,0,.45);border-bottom:1px solid ${c}33">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="background:${c};color:#000;font-size:.55rem;font-weight:900;letter-spacing:.12em;padding:3px 8px;border-radius:2px">⚠ ${sev.label}</span>
    <span style="color:${c};font-size:.7rem;font-weight:700;letter-spacing:.1em">DOC ANOMALY — ${cs.replace(/_/g,' ')}</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:.55rem;color:#334155">${payload.source==='analysis-hub'?'📊 FROM HUB':'📄 FROM DOC SEARCH'}</span>
    <button onclick="document.getElementById('tsm-anb-root').remove()" style="background:transparent;border:1px solid #1e293b;color:#475569;font-family:'Courier New',monospace;font-size:.55rem;padding:3px 8px;border-radius:2px;cursor:pointer">✕ DISMISS</button>
  </div>
</div>
<div style="padding:5px 14px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.04);font-size:.58rem;color:#475569;display:flex;flex-wrap:wrap;gap:0 4px">${metaHtml}</div>
<div style="display:grid;grid-template-columns:1fr 1.05fr 1.4fr;gap:0">
  <div style="padding:13px;border-right:1px solid rgba(255,255,255,.05)">
    <div style="color:#334155;font-size:.56rem;letter-spacing:.12em;margin-bottom:7px;font-weight:700">WHAT'S WRONG</div>
    <p style="color:#94a3b8;font-size:.66rem;line-height:1.65;margin:0 0 11px">${narr}</p>
    ${findings.length?`<div style="color:#334155;font-size:.56rem;letter-spacing:.1em;margin-bottom:5px;font-weight:700">FINDINGS</div>${findings.map(f=>`<div style="color:#64748b;font-size:.63rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.4">${f}</div>`).join('')}`:''}
  </div>
  <div style="padding:13px;border-right:1px solid rgba(255,255,255,.05)">
    <div style="color:#334155;font-size:.56rem;letter-spacing:.12em;margin-bottom:7px;font-weight:700">BEST APP TO CURE IT</div>
    ${appsHtml}
    <div style="margin-top:8px;padding:7px 9px;background:rgba(0,0,0,.2);border-radius:3px;border:1px solid rgba(255,255,255,.04)">
      <div style="color:#1e293b;font-size:.56rem;letter-spacing:.07em;margin-bottom:3px">RELAY STATUS</div>
      <div style="color:#334155;font-size:.58rem;line-height:1.4">Doc fields auto-populate intake on destination node. Fill steps first for best results.</div>
    </div>
  </div>
  <div style="padding:13px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <div style="color:#334155;font-size:.56rem;letter-spacing:.12em;font-weight:700">GUIDED REMEDIATION</div>
      <span id="tsm-anb-counter" style="font-size:.58rem;color:${c}">0 / ${steps.length} complete</span>
    </div>
    <div style="height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:9px;overflow:hidden">
      <div id="tsm-anb-bar" style="height:100%;width:0%;background:${c};border-radius:2px;transition:width .35s"></div>
    </div>
    ${stepsHtml}
    <div id="tsm-anb-done" style="display:none;padding:9px;border-radius:3px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981;font-size:.65rem;font-weight:700;text-align:center;letter-spacing:.06em;margin-top:6px">✓ ALL STEPS COMPLETE — READY TO ESCALATE</div>
  </div>
</div>
</div>`;

  const total=steps.length;let completed=0;const fs={};
  window.TSM_ANB={
    payload,nodeId,
    toggle(si){const b=document.getElementById('tsm-body-'+si),cv=document.getElementById('chev-'+si),open=b.style.display!=='none';b.style.display=open?'none':'block';cv.style.transform=open?'':'rotate(180deg)';},
    check(si,checked){
      const el=document.getElementById('tsm-anb-step-'+si);
      if(checked){el.classList.add('done');completed++;}else{el.classList.remove('done');completed--;}
      completed=Math.max(0,Math.min(total,completed));
      document.getElementById('tsm-anb-counter').textContent=completed+' / '+total+' complete';
      document.getElementById('tsm-anb-bar').style.width=Math.round(completed/total*100)+'%';
      if(completed===total){document.getElementById('tsm-anb-done').style.display='block';TSM_ANB.fillIntake();}
      else document.getElementById('tsm-anb-done').style.display='none';
      if(checked&&si+1<total){const nb=document.getElementById('tsm-body-'+(si+1));if(nb&&nb.style.display==='none')TSM_ANB.toggle(si+1);}
    },
    save(id,val){fs[id]=val;try{const d=JSON.parse(localStorage.getItem('tsm-doc-anomaly')||'{}');d._fields=d._fields||{};d._fields[id]=val;localStorage.setItem('tsm-doc-anomaly',JSON.stringify(d));}catch(e){}},
    openApp(url,engine,label){TSM_ANB.writeRelay(engine);},
    runEngine(url,engine,ck){TSM_ANB.writeRelay(engine,ck);window.open(url,'_blank');},
    writeRelay(engine,ck){
      try{localStorage.setItem('tsm-node-relay',JSON.stringify({fromAnomaly:true,checkStatus:cs,intakeFields:{patient:fs['f-patient']||payload.client||'',claim:fs['f-claim']||payload.ref||'',payer:fs['f-payer']||payload.vendor||'',denial:fs['f-code']||payload.exclusionCode||'',cpt:fs['f-cpt']||'',amount:fs['f-amount']||(payload.financialImpact?'$'+Number(payload.financialImpact).toLocaleString():''),issue:payload.narrative||''},suggestedEngine:engine||'',contextKey:ck||'',sourceFile:payload.fileName||'',sourceRef:payload.ref||'',ts:Date.now()}));}catch(e){}
    },
    fillIntake(){
      const map={'intake-patient':fs['f-patient']||payload.client||'','intake-claim':fs['f-claim']||payload.ref||'','intake-payer':fs['f-payer']||payload.vendor||'','intake-denial':fs['f-code']||payload.exclusionCode||'','intake-cpt':fs['f-cpt']||'','intake-amount':fs['f-amount']||(payload.financialImpact?'$'+Number(payload.financialImpact).toLocaleString():''),'intake-issue':payload.narrative||''};
      Object.entries(map).forEach(([id,val])=>{if(!val)return;const el=document.getElementById(id);if(el){el.value=val;el.style.borderColor='#00e5ff55';}});
      if(typeof applyIntake==='function')applyIntake();
      TSM_ANB.writeRelay();
    },
    markAllComplete(){for(let i=0;i<total;i++){const c=document.getElementById('tsm-chk-'+i);if(c&&!c.checked){c.checked=true;TSM_ANB.check(i,true);}}},
  };
}
window._tsmBannerRender=renderBanner;

// Init on page load
function init(){
  const nodeId=resolveNodeId();if(!nodeId)return;
  let p;try{const r=localStorage.getItem('tsm-doc-anomaly');if(!r)return;p=JSON.parse(r);}catch(e){return;}
  if(!p||!p.checkStatus||p.checkStatus==='PASSED')return;
  if(p.ts&&(Date.now()-p.ts)>14400000)return;
  renderBanner(p,nodeId);
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
