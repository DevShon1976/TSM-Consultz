<!-- Updated with Persistent Library Tab -->
<div id="library-tab">
    <button onclick="fillAudit('Medical')">Medical WIP</button>
    <button onclick="fillAudit('Construction')">Construction WIP</button>
    <button onclick="fillAudit('Legal')">Legal Audit</button>
</div>
<script>
function fillAudit(sector) {
    const input = document.getElementById('search-bar');
    if(sector === 'Legal') input.value = 'auditops "Mesa Premier Legal - Factor: Municipal Residency" --logic=strategist';
    else if(sector === 'Medical') input.value = 'auditops --sector=medical --logic=strategist';
    else input.value = 'auditops --sector=construction --logic=strategist';
}
</script>
