<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TSM Executive Portal | Hybrid Mesh</title>
    <link rel="stylesheet" href="/shared/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --mesh-cyan: #00f2ff; --mesh-bg: rgba(0, 242, 255, 0.05); }
        .mesh-header { background: var(--mesh-bg); border-bottom: 2px solid var(--mesh-cyan); padding: 15px; margin-bottom: 20px; }
        .legacy-workspace { padding: 0 20px; }
        .toggle-btn { background: #111; color: var(--mesh-cyan); border: 1px solid var(--mesh-cyan); padding: 5px 15px; cursor: pointer; font-family: monospace; }
        .toggle-btn:hover { background: var(--mesh-cyan); color: #000; }
    </style>
</head>
<body style="background: #000; color: #fff; font-family: 'JetBrains Mono', monospace;">

    <div class="mesh-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0; color: var(--mesh-cyan);">🛰️ SOVEREIGN MESH: ACTIVE</h3>
            <div id="mesh-status">11/11 NODES ONLINE</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
            <div id="intelligence-output" style="background: #111; padding: 10px; border: 1px solid #333;">
                <p style="color: #666; font-size: 12px;">MESH ANALYTICS LOADING...</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="toggle-btn" onclick="AuditOpsPortal.syncUniversalWIP('Medical')">SYNC MEDICAL WIP</button>
                <button class="toggle-btn" onclick="AuditOpsPortal.syncUniversalWIP('Construction')">SYNC CONSTRUCTION WIP</button>
            </div>
        </div>
    </div>

    <div class="legacy-workspace">
        <h4 style="border-left: 3px solid #fff; padding-left: 10px;">AUDIT WORKSPACE: DETAILED LOGS</h4>
        <div id="original-tables-root">
            <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px;">
                <tr style="background: #222; color: var(--mesh-cyan);">
                    <th style="padding: 10px; text-align: left;">FACTOR</th>
                    <th style="padding: 10px; text-align: left;">REVENUE RISK</th>
                    <th style="padding: 10px; text-align: left;">AUDIT STATUS</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">Ameris Job #203</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333; color: #ff4b2b;">-$900,000 (RECOUP)</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">PENDING CFO</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">99214 Upcoding</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333; color: #ff4b2b;">14 INSTANCES</td>
                    <td style="padding: 10px; border-bottom: 1px solid #333;">FLAGGED</td>
                </tr>
            </table>
        </div>
    </div>

    <script src="/shared/tsm-shared.js"></script>
</body>
</html>
