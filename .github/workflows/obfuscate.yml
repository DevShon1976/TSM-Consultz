# TSM Shell — Auto JS Obfuscation Pipeline
# DISABLED 2026-07-01: the obfuscation config (selfDefending + controlFlowFlattening +
# stringArrayEncoding) produces syntactically invalid JS -- confirmed via node --check
# failing on the output. Auto-committing this to main would have broken every inline
# <script> block across the app. Not needed right now anyway (in-house only, no IP
# exposure). Left as workflow_dispatch-only so it can be re-enabled manually once the
# obfuscator config is fixed and validated.
#
# Originally: ran on every push to main, obfuscated all inline <script> blocks
# across /html, then committed the result back to the repo.

name: Obfuscate JS

on:
  workflow_dispatch:       # manual trigger only -- push auto-trigger removed

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    # Skip if the commit was made by the action itself (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run obfuscation pipeline
        run: node html/build.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit obfuscated files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "TSM Build Bot"
          git config user.email "build@tsm-shell.fly.dev"
          git add html/
          git commit -m "chore: obfuscate inline JS [skip ci]"
          git push
