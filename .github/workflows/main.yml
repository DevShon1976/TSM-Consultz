name: CRCR Audit
on: workflow_dispatch

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CRCR Audit
        run: |
          FILE="html/healthcare/crc-hc-practice.html"
          if [ ! -f "$FILE" ]; then echo "❌ File not found: $FILE"; exit 1; fi
          CHECKS=("eligibility" "prior authorization" "coordination of benefits" "medical necessity" "icd-10" "cpt" "clean claim" "clearinghouse" "era" "eob" "denial" "timely filing" "appeal" "payment posting" "financial counseling" "deductible" "copay" "coinsurance" "upcoding" "unbundling" "npi" "adjudication")
          FOUND=0; MISSING=0
          for term in "${CHECKS[@]}"; do
            if grep -iq "$term" "$FILE"; then echo "✅ $term"; ((FOUND++))
            else echo "❌ MISSING: $term"; ((MISSING++)); fi
          done
          SCORE=$((FOUND * 100 / (FOUND + MISSING)))
          echo "Score: $SCORE% ($FOUND found, $MISSING missing)"
